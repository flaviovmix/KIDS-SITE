<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Histórias — Kaco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Componente kids-historias (hero + filtros + grid) renderiza aqui -->
<div id="kidsHistorias"></div>

<script src="script.js"></script>
<script src="components/kids-menu.js"></script>
<script src="components/kids-stories.js"></script>
<script>
    // Tudo (título, categoria, capa, descrição) vem de kids-stories.js (fonte única).
    // Os chips filtram por PERSONAGEM (KIDS_PERSONAGENS); a categoria segue só como
    // selo/cor do card. Cada história herda seus personagens (s.personagens) pro filtro.
    window.kidsHistoriasConfig = {
        kicker: 'AS AVENTURAS DO KACO',
        titulo: 'Histórias',
        sub: 'Cada história é curtinha, ilustrada e no ritmo de quem lê.',
        hint: 'Clique num personagem pra filtrar ↗',
        acaoLabel: 'Ler →',
        categorias: window.KIDS_CATEGORIAS,   // selo/cor do card
        filtros: window.KIDS_PERSONAGENS,     // chips: filtra por personagem
        itens: window.KIDS_STORIES.map(function (s) {
            return {
                t: s.t, cat: s.cat, img: s.img,
                link: 'historia.html?id=' + s.id,
                status: 'no ar', desc: s.desc,
                filtros: s.personagens || [],
            };
        }),
    };
</script>
<script src="components/kids-hero.js"></script>
<script src="components/kids-historias.js"></script>
<script src="components/kids-toc.js"></script>
<script src="components/kids-nav.js"></script>
<script src="components/kids-footer.js"></script>
</body>
</html>
