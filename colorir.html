  const pop=document.createElement('div'); pop.className='tt-dd-list tt-bg-pop'; pop.hidden=true;
  const none=document.createElement('button'); none.type='button'; none.className='tt-bg-none'; none.textContent='Sem borda';
  const grid=document.createElement('div'); grid.className='tt-bg-grid';
  const opRow=document.createElement('label'); opRow.className='tt-bg-op';
  const op=document.createElement('input'); op.type='range'; op.min='0'; op.max='100'; op.value='100';
  const opVal=document.createElement('span'); opRow.append('Opacidade', op, opVal);
  const thRow=document.createElement('label'); thRow.className='tt-bg-op';
  const th=document.createElement('input'); th.type='range'; th.min='1'; th.max='40'; th.value='4';
  const thVal=document.createElement('span'); thRow.append('Espessura', th, thVal);
  const raRow=document.createElement('label'); raRow.className='tt-bg-op';
  const ra=document.createElement('input'); ra.type='range'; ra.min='0'; ra.max='80'; ra.value='0';
  const raVal=document.createElement('span'); raRow.append('Cantos', ra, raVal);
  const opacity=()=>(+op.value)/100, width=()=>+th.value;
  function renderCur(){ cur.style.boxShadow = txtBorder ? 'inset 0 0 0 4px '+bgCss(txtBorder) : ''; cur.classList.toggle('is-none', !txtBorder);
    if(txtBorder){ op.value=Math.round(txtBorder.a*100); th.value=txtBorder.width; }
    opVal.textContent=op.value+'%'; thVal.textContent=th.value+'px';
    ra.value=txtRadius; raVal.textContent=txtRadius+'px';                                   // cantos: propriedade do box (independe da borda)
    [...grid.children].forEach(b=>b.classList.toggle('sel', !!txtBorder && b.dataset.hex===txtBorder.hex)); }
  PALETTE.forEach(hex=>{ const b=document.createElement('button'); b.type='button'; b.className='tt-bg-sw'; b.style.background=hex; b.dataset.hex=hex;
    b.addEventListener('click',()=>{ const [r,g,bl]=hexToRgba(hex); txtBorder={r,g,b:bl,a:opacity(),hex,width:width()}; renderCur(); applyBorder(); });
    grid.appendChild(b); });
  none.addEventListener('click',()=>{ txtBorder=null; renderCur(); applyBorder(); });
  op.addEventListener('input',()=>{ if(txtBorder) txtBorder.a=opacity(); opVal.textContent=op.value+'%'; applyBorder(); });
  th.addEventListener('input',()=>{ if(txtBorder) txtBorder.width=width(); thVal.textContent=th.value+'px'; applyBorder(); });
  ra.addEventListener('input',()=>{ txtRadius=+ra.value; raVal.textContent=ra.value+'px'; applyRadius(); });
  pop.append(none, grid, opRow, thRow, raRow);
  function close(){ pop.hidden=true; wrap.classList.remove('open'); }
  function open(){ const r=cur.getBoundingClientRect(); pop.style.left=Math.max(8,r.right-208)+'px'; pop.style.top=(r.bottom+6)+'px'; pop.hidden=false; wrap.classList.add('open'); renderCur(); }
  cur.addEventListener('click',()=>{ pop.hidden?open():close(); });
  wrap.addEventListener('mousedown',e=>e.preventDefault());
  pop.addEventListener('mousedown',e=>{ if(e.target!==op && e.target!==th && e.target!==ra) e.preventDefault(); });   // sliders precisam do arraste
  document.addEventListener('pointerdown',e=>{ if(!wrap.contains(e.target) && !pop.contains(e.target)) close(); });
  wrap.appendChild(cur); document.body.appendChild(pop); renderCur();
  wrap.set=()=>renderCur();
  return wrap;
}
const bgDD=makeBgControl();
const borderDD=makeBorderControl();
document.getElementById('ttFontSlot').replaceWith(fontDD);
document.getElementById('ttSizeSlot').replaceWith(sizeDD);
document.getElementById('ttBgSlot').replaceWith(bgDD);
document.getElementById('ttBorderSlot').replaceWith(borderDD);
function applyBg(){                                          // fundo mudou: redesenha texto em digitação / forma flutuante
  if(txtEdit) txtEdit.paint();
  else if(pendingShape && pendingShape.type==='text'){ pendingShape.bg = txtBg?{...txtBg}:null; renderPending(); }
}
function applyBorder(){                                      // borda mudou: redesenha texto em digitação / forma flutuante
  if(txtEdit) txtEdit.paint();
  else if(pendingShape && pendingShape.type==='text'){ pendingShape.border = txtBorder?{...txtBorder}:null; renderPending(); }
}
function applyRadius(){                                      // raio dos cantos mudou: redesenha
  if(txtEdit) txtEdit.paint();
  else if(pendingShape && pendingShape.type==='text'){ pendingShape.radius = txtRadius; renderPending(); }
}
function syncTextToolbar(){ ttBold.classList.toggle('sel',txtBold); ttItalic.classList.toggle('sel',txtItalic);
  ttUnder.classList.toggle('sel',txtUnder); sizeDD.set(txtSize); fontDD.set(txtFont); bgDD.set(); borderDD.set(); syncAlignButtons(); }
function applyTextStyle(){
  if(txtEdit){                                              // digitando: aplica no textarea ao vivo, sem fechar a caixa
    const ed=txtEdit; ed.fontSize=txtSize; ed.halign=txtAlign; ed.valign=txtVAlign;
    ed.ta.style.font=textFont({ italic:txtItalic, bold:txtBold, fontSize:Math.round(txtSize*ed.scale), font:txtFont });
    ed.ta.style.textDecoration = txtUnder ? 'underline' : 'none';
    ed.ta.style.height='auto'; ed.ta.style.height=ed.ta.scrollHeight+'px'; ed.place(); ed.paint();
  } else if(pendingShape && pendingShape.type==='text'){    // estiliza o texto flutuante ao vivo
    pendingShape.bold=txtBold; pendingShape.italic=txtItalic; pendingShape.underline=txtUnder;
    pendingShape.fontSize=txtSize; pendingShape.font=txtFont; pendingShape.halign=txtAlign; pendingShape.valign=txtVAlign;
    measureText(pendingShape); renderPending();
  } }
ttBold.onclick   =()=>{ txtBold=!txtBold;     syncTextToolbar(); applyTextStyle(); };
ttItalic.onclick =()=>{ txtItalic=!txtItalic; syncTextToolbar(); applyTextStyle(); };
ttUnder.onclick  =()=>{ txtUnder=!txtUnder;   syncTextToolbar(); applyTextStyle(); };
ttHAlign.onclick =()=>{ txtAlign =HALIGN_ORDER[(HALIGN_ORDER.indexOf(txtAlign)+1)%3];  syncTextToolbar(); applyTextStyle(); };   // cicla esquerda→centro→direita
ttVAlign.onclick =()=>{ txtVAlign=VALIGN_ORDER[(VALIGN_ORDER.indexOf(txtVAlign)+1)%3]; syncTextToolbar(); applyTextStyle(); };   // cicla topo→meio→base
textTools.addEventListener('mousedown', e=>e.preventDefault());             // toda a barra mantém o foco da digitação
syncTextToolbar();
// Gruda a mini-barra logo acima da caixa de texto (em edição ou flutuante). Sem caixa: volta pro canto (CSS).
function updateTextToolsPos(){
  if(tool!=='text') return;
  let left, top;
  if(txtEdit){ left=txtEdit.cx - txtEdit.w/2; top=txtEdit.cy - txtEdit.curH()/2; }
  else if(pendingShape && pendingShape.type==='text'){ left=pendingShape.cx - pendingShape.w/2; top=pendingShape.cy - pendingShape.h/2; }
  if(left===undefined){ textTools.style.position=''; textTools.style.zIndex=''; textTools.style.left=''; textTools.style.top=''; textTools.style.transform=''; return; }   // sem caixa: volta pro canto (CSS)
  const sp=canvasToScreen(left, top);
  textTools.style.position='fixed'; textTools.style.zIndex='1200';   // viewport (igual canvasToScreen) e acima do textarea
  textTools.style.left=sp.x+'px';
  textTools.style.top=Math.max(56, sp.y - 8)+'px';                         // logo acima da borda superior da caixa
  textTools.style.transform='translate(0,-100%)';                          // alinhada à esquerda da caixa (não centralizada sobre o giro)
}

function selectTool(t, btn){                      // troca a ferramenta ativa (usado pela barra e pelo seletor de balões)
  if(curvePhase!==0) endCurve(false);            // descarta curva incompleta ao trocar de ferramenta
  if(pendingShape) commitPending();              // fixa a forma flutuante ao trocar de ferramenta
  tool=t;
  clearTimeout(bucketUpTimer);                    // cancela o timer do balde pra ele não sobrescrever o novo cursor
  textTools.hidden = (tool!=='text');            // a mini-barra de texto só aparece na ferramenta Texto
  updateTextToolsPos();                          // posiciona a barra (acima da caixa, se houver)
  cv.style.cursor=toolCursor();                  // balde/pincel mostram o ícone no ponteiro; borracha esconde (usa o anel)
  if(tool!=='eraser'&&tool!=='brush') toolRing.style.display='none';
  document.querySelectorAll('.tool').forEach(x=>x.classList.remove('sel')); if(btn) btn.classList.add('sel');
}
document.querySelectorAll('.tool[data-tool]').forEach(b=>b.onclick=()=>selectTool(b.dataset.tool, b));   // balloonBtn (sem data-tool) tem handler próprio
// ---- seletor de balões: 1 botão abre um painel com os modelos ----
const balloonBtn=document.getElementById('balloonBtn'), balloonPanel=document.getElementById('balloonPanel');
const SV='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round">';
function burstIconPath(){ let d='', n=10, cx=12, cy=12; for(let i=0;i<n*2;i++){ const a=-Math.PI/2+i*Math.PI/n, r=(i%2?6.5:11);
  d+=(i?'L':'M')+(cx+Math.cos(a)*r).toFixed(1)+' '+(cy+Math.sin(a)*r).toFixed(1); } return d+'Z'; }
const BALLOONS=[
  { type:'speech',     name:'Fala',       icon:SV+'<path d="M4 4h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-8l-4 4v-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>' },
  { type:'rectspeech', name:'Retângulo',  icon:SV+'<path d="M2 4h20v12h-8l-4 4v-4H2z"/></svg>' },
  { type:'oval',       name:'Oval',       icon:SV+'<ellipse cx="12" cy="9.5" rx="10" ry="7"/><path d="M9 16l-2 6 6-5"/></svg>' },
  { type:'funbubble',  name:'Divertido',  icon:SV+'<path d="M3 8l18-4 1 11-9 1-3 4-1-4-6-1z"/></svg>' },
  { type:'thought',    name:'Pensamento', icon:SV+'<ellipse cx="12" cy="9" rx="9" ry="6.5"/><circle cx="6.5" cy="18" r="1.7"/><circle cx="3.5" cy="21.5" r="1"/></svg>' },
  { type:'cloudspeech',name:'Nuvem',      icon:SV+'<path d="M2.25 15a4.5 4.5 0 0 0 4.5 4.5H18a3.75 3.75 0 0 0 1.332-7.257 3 3 0 0 0-3.758-3.848 5.25 5.25 0 0 0-10.233 2.33A4.502 4.502 0 0 0 2.25 15z"/><path d="M9 19.4l-1.7 4 3.3-2.5"/></svg>' },
  { type:'burst',      name:'Grito',      icon:SV+'<path d="'+burstIconPath()+'"/></svg>' },
];
BALLOONS.forEach(bl=>{ const b=document.createElement('button'); b.type='button'; b.className='predef-item';
  b.innerHTML=bl.icon+'<span>'+bl.name+'</span>';
  b.onclick=()=>{ selectTool(bl.type, balloonBtn); balloonPanel.hidden=true; };
  balloonPanel.appendChild(b); });
function positionPanelUnder(panel, btn){                       // abre o painel centralizado logo abaixo do botão que o chamou
  const app=document.querySelector('.paint-app'), ar=app.getBoundingClientRect(), br=btn.getBoundingClientRect();
  let cx=(br.left+br.width/2)-ar.left, half=(panel.offsetWidth||310)/2;
  cx=Math.max(half+8, Math.min(cx, ar.width-half-8));          // não deixa o painel vazar pelas bordas do app
  panel.style.left=cx+'px'; panel.style.top=(br.bottom-ar.top+10)+'px'; }
balloonBtn.onclick=e=>{ e.stopPropagation(); if(typeof closePredef==='function') closePredef();
  const show=balloonPanel.hidden; balloonPanel.hidden=!show;
  if(show) positionPanelUnder(balloonPanel, balloonBtn); };
balloonPanel.addEventListener('click',e=>e.stopPropagation());
document.addEventListener('click',()=>{ if(!balloonPanel.hidden) balloonPanel.hidden=true; });   // clicar fora fecha
cv.style.cursor=toolCursor();                    // ferramenta inicial (balde) já entra com o ícone

/* ===== Desenhos prontos (galeria): carimba uma figura pronta (line-art PNG) como forma flutuante ===== */
// pra somar mais desenhos depois: é só acrescentar uma entrada { name, src } aqui (PNG preto, fundo branco/transparente).
const PREDEF = {
  flower:  { name:'Flor',     src:'colorir/desenhos-prontos/flor.png' },
  kaco:    { name:'Kaco',     src:'colorir/desenhos-prontos/kaco.png' },
  cloud:   { name:'Nuvem',    src:'colorir/desenhos-prontos/nuvem.png' },
  grass:   { name:'Matinho',  src:'colorir/desenhos-prontos/matinho.png' },
};
// pré-carrega as imagens e guarda a proporção (pra carimbar sem distorcer)
Object.values(PREDEF).forEach(p=>{ const img=new Image();
  img.onload=()=>{ p.img=img; p.ar=img.naturalWidth/img.naturalHeight; }; img.src=p.src; });

// carimba o desenho escolhido no centro do canvas como forma flutuante (mover/girar/escalar/colorir depois)
function insertPredef(id){ const p=PREDEF[id]; if(!p||!p.img) return;
  if(curvePhase!==0) endCurve(false);
  if(pendingShape) commitPending();
  let w=p.img.naturalWidth, h=p.img.naturalHeight;               // tamanho original do PNG (1:1)
  const fit=Math.min(1, cv.width*0.9/w, cv.height*0.9/h);        // só reduz se não couber no canvas; nunca amplia
  w*=fit; h*=fit;
  if(h<150){ w*=1.5; h*=1.5; }                                   // desenho pequeno (<150px de altura): +50% pra ficar visível
  pendingSnapshot=ctx.getImageData(0,0,cv.width,cv.height);
  const m=16;                                                    // entra encostado no canto superior esquerdo (com folga)
  pendingShape={ type:'predef', draw:id, cx:m+w/2, cy:m+h/2, w, h, rot:0 };
  renderPending(); }

// painel: um botão por desenho, usando o próprio PNG como prévia
const galleryBtn=document.getElementById('galleryBtn'), predefPanel=document.getElementById('predefPanel');
Object.keys(PREDEF).forEach(id=>{ const p=PREDEF[id];
  const b=document.createElement('button'); b.type='button'; b.className='predef-item';
  b.innerHTML='<img alt="" src="'+p.src+'"><span>'+p.name+'</span>';
  b.onclick=()=>{ insertPredef(id); closePredef(); };
  predefPanel.appendChild(b); });
function openPredef(){ if(balloonPanel) balloonPanel.hidden=true; predefPanel.hidden=false; positionPanelUnder(predefPanel, galleryBtn); galleryBtn.classList.add('on'); }
function closePredef(){ predefPanel.hidden=true; galleryBtn.classList.remove('on'); }
galleryBtn.onclick=e=>{ e.stopPropagation(); predefPanel.hidden ? openPredef() : closePredef(); };
predefPanel.addEventListener('click',e=>e.stopPropagation());
document.addEventListener('click',()=>{ if(!predefPanel.hidden) closePredef(); });   // clicar fora (canvas/ferramenta) fecha
const sizeEl=document.getElementById('size');
function syncSizeFill(){ const pct=(sizeEl.value-sizeEl.min)/(sizeEl.max-sizeEl.min)*100;
  sizeEl.style.setProperty('--p', pct+'%'); }                 // preenche de baixo até o thumb
sizeEl.oninput=()=>{ brushSize=+sizeEl.value; syncSizeFill();
  if(pendingShape) renderPending(); updateToolRing(); };   // redimensiona a forma flutuante e o anel na hora
syncSizeFill();
document.getElementById('clear').onclick=()=>{ pendingShape=null; pendingSnapshot=null;
  curvePhase=0; curveDrag=false; curveSnap=null;
  if(loadedImg) drawImg(loadedImg); else if(blankMode) blankCanvas(); else drawSample(); };
// achata as camadas VISÍVEIS (desenho + texto) num único canvas pra exportar/imprimir
function flattenCanvas(){ const c=document.createElement('canvas'); c.width=cv.width; c.height=cv.height;
  const x=c.getContext('2d'); x.fillStyle='#fff'; x.fillRect(0,0,c.width,c.height);   // base branca (caso o desenho esteja oculto)
  [cv,tcv].forEach(cnv=>{ if(!cnv.classList.contains('layer-hidden')) x.drawImage(cnv,0,0); });
  return c; }
document.getElementById('save').onclick=()=>{ if(curvePhase!==0) endCurve(true); if(pendingShape) commitPending(); const a=document.createElement('a');
  a.download='colorir.png'; a.href=flattenCanvas().toDataURL('image/png'); a.click(); };
document.getElementById('print').onclick=()=>{ if(curvePhase!==0) endCurve(true); if(pendingShape) commitPending(); const w=window.open('');
  w.document.write('<img src="'+flattenCanvas().toDataURL()+'" style="max-width:100%">'); w.document.close(); w.focus(); setTimeout(()=>w.print(),300); };
// ---- camadas: ocultar/exibir (olho) ----
const layerCanvas={ text:tcv };
document.querySelectorAll('.layer-btn').forEach(b=>{ b.onclick=()=>{
  const cnv=layerCanvas[b.dataset.layer], hidden=cnv.classList.toggle('layer-hidden');   // opacity:0 esconde sem matar o clique do fundo
  b.classList.toggle('off', hidden);
  b.querySelector('i').className='fa-solid '+(hidden?'fa-eye-slash':'fa-eye'); }; });

// ---- upload de arte real ----
let loadedImg=null;
function drawImg(img){ // encaixa mantendo proporção, fundo branco
  pendingShape=null; pendingSnapshot=null;        // troca de imagem cancela forma flutuante
  cv.width = img.naturalWidth>1200?1200:img.naturalWidth;
  cv.height = Math.round(cv.width * img.naturalHeight/img.naturalWidth);
  // moldura acompanha a proporção da imagem (sem letterbox)
  const wrap = cv.closest('.canvas-wrap');
  if(wrap) wrap.style.aspectRatio = cv.width + ' / ' + cv.height;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.drawImage(img,0,0,cv.width,cv.height);
  texts.length=0; syncTextCanvasSize(); renderTextLayer();    // camada de texto acompanha o novo tamanho e zera
  undoStack.length=0; pushUndo();
}
function blankCanvas(){ // tela branca no tamanho padrão (card "desenhe ou carregue")
  pendingShape=null; pendingSnapshot=null;
  cv.width=760; cv.height=470;
  const wrap=cv.closest('.canvas-wrap'); if(wrap) wrap.style.aspectRatio='760 / 470';
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
  texts.length=0; syncTextCanvasSize(); renderTextLayer();    // camada de texto acompanha o tamanho e zera
  undoStack.length=0; pushUndo();
}
document.getElementById('upload').onchange=e=>{ const f=e.target.files[0]; if(!f) return;
  const img=new Image(); img.onload=()=>{ loadedImg=img; drawImg(img); }; img.src=URL.createObjectURL(f); };

// ---- zoom: escala visual do canvas (pos() usa getBoundingClientRect, então o clique acompanha o zoom) ----
const zoomWrap=cv.closest('.canvas-wrap'), zoomValEl=document.getElementById('zoomVal');
let zoom=1;
function applyView(){ zoomWrap.style.transform = (zoom===1 && !panX && !panY) ? '' : 'translate('+panX+'px,'+panY+'px) scale('+zoom+')'; }
function setZoom(z){ zoom=Math.min(4,Math.max(1,Math.round(z*20)/20));   // trava entre 100% e 400%
  applyView();
  zoomValEl.textContent=Math.round(zoom*100)+'%'; }
document.getElementById('zoomIn').onclick =()=>setZoom(zoom+0.25);
document.getElementById('zoomOut').onclick=()=>setZoom(zoom-0.25);
document.getElementById('zoomReset').onclick=()=>{ panX=0; panY=0; setZoom(1); };
cv.addEventListener('mousedown',e=>{ if(e.button===1) e.preventDefault(); });
</script>
