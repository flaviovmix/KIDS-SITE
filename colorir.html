<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Colorir — Kaco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Comic+Neue:ital,wght@0,400;0,700;1,400&family=Pacifico&family=Patrick+Hand&family=Luckiest+Guy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Botão central que abre o ateliê de pintura (placeholder até ter cards). */
        .colorir-cta { text-align:center; padding:8px 18px 64px; }

        /* Destaca o(s) card(s) de desenho desta página: borda mais grossa e escura. */
        .hist-card { border:4px solid rgba(var(--shadow-rgb),0.55); }
        /* Divisória entre a imagem e o texto do card. */
        .hist-body { border-top:2px solid rgba(var(--shadow-rgb),0.55); }

        /* Grid centralizado: com poucos desenhos os cards não ficam jogados à esquerda.
           Colunas com teto de largura (~340px) + justify-content centram tanto 1 card
           quanto a fileira cheia de 3 (e as 2 fileiras quando chega a 6). */
        .hist-grid { justify-content:center; }
        @media (min-width:640px){ .hist-grid { grid-template-columns:repeat(2, minmax(0,340px)); } }
        @media (min-width:980px){ .hist-grid { grid-template-columns:repeat(3, minmax(0,340px)); } }
        /* Filtro sem desenho: a mensagem de vazio fica AO LADO do card "Desenhe ou
           carregue" (ele aparece sempre), ocupando as colunas restantes da fileira —
           não numa faixa embaixo. Estica na altura do card e centra o conteúdo. No
           mobile (1 coluna) volta pra baixo, largura cheia (regra base do style.css). */
        @media (min-width:640px){
            .hist-empty { grid-column:2 / -1; display:flex; flex-direction:column;
                align-items:center; justify-content:center; }
        }

        /* ===== Modal do ateliê de pintura ===== */
        .paint-modal { position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; padding:0; }
        .paint-modal[hidden] { display:none; }
        .paint-modal-backdrop { position:absolute; inset:0; background:rgba(15,23,42,.55); backdrop-filter:blur(2px); }
        .paint-modal-card { position:relative; z-index:1; background:#fff; border-radius:0; padding:8px;
            width:100vw; max-width:none; height:100vh; max-height:100vh; overflow:auto; box-shadow:0 24px 60px rgba(0,0,0,.35);
            display:flex; flex-direction:column; }
        /* Pílula com bolinha de ícone — base compartilhada (Sair / Salvar / Imprimir).
           Geometria + ícone + hover/active aqui; cor é só um modificador --amber/--green/--blue;
           posição fica na classe de cada botão (.io-bar). */
        .pill-btn { display:inline-flex; align-items:center; gap:10px; height:52px; padding:0 22px 0 8px;
            border:0; border-radius:999px; color:#fff; font-family:'Baloo 2',system-ui,sans-serif;
            font-size:1.15rem; font-weight:700; line-height:1; cursor:pointer; transition:transform .15s ease; }
        .pill-btn:hover  { transform:translateY(-2px) scale(1.05); }
        .pill-btn:active { transform:translateY(0) scale(0.96); }
        .pill-btn__icon  { display:grid; place-items:center; width:38px; height:38px; flex:none;
            border-radius:50%; background:rgba(255,255,255,0.28); font-size:18px; }
        .pill-btn--amber { background:linear-gradient(135deg, var(--c-amber), var(--c-pink)); box-shadow:0 12px 28px rgba(236,72,153,0.38); }
        .pill-btn--green { background:linear-gradient(135deg,#34d399,#059669); box-shadow:0 12px 28px rgba(5,150,105,0.38); }
        .pill-btn--blue   { background:linear-gradient(135deg,#38bdf8,#2563eb); box-shadow:0 12px 28px rgba(37,99,235,0.38); }
        .pill-btn--red    { background:linear-gradient(135deg,#fb7185,#e11d48); box-shadow:0 12px 28px rgba(225,29,72,0.38); }
        .pill-btn--violet { background:linear-gradient(135deg,#a78bfa,#7c3aed); box-shadow:0 12px 28px rgba(124,58,237,0.38); }
        .pill-btn--teal   { background:linear-gradient(135deg,#2dd4bf,#0d9488); box-shadow:0 12px 28px rgba(13,148,136,0.38); }
        /* Clicar fora não fecha: o card dá uma "tremidinha" avisando. */
        @keyframes paintShake {
            10%,90% { transform:translateX(-2px); }
            20%,80% { transform:translateX(4px); }
            30%,50%,70% { transform:translateX(-9px); }
            40%,60% { transform:translateX(9px); }
        }
        .paint-modal-card.shake { animation:paintShake .45s cubic-bezier(.36,.07,.19,.97); }

        /* ===== Ateliê: canvas grande no centro, controles flutuando por cima ===== */
        .paint-app { --panel:#2b2f36; --accent:#a23ca0; font-family:'Baloo 2',system-ui,sans-serif; color:#222;
            position:relative; flex:1; min-height:0; }
        .paint-app * { box-sizing:border-box; }
        /* canvas no centro; o inset deixa margem pras barras flutuantes nas bordas */
        .paint-app .canvas-area { position:absolute; inset:92px 14px 92px 14px;
            display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .paint-app .canvas-wrap { transition:transform .12s ease; transform-origin:center center; }
        /* meia-largura do canvas (proporção 760/470, travado pela altura) — usado pra
           colar o slider e as cores nas laterais do desenho em qualquer tamanho de tela */
        .paint-app { --canvas-edge:calc(50vw + min((100vh - 200px) * 0.808, 50vw - 22px) + 80px); }
        .paint-app .canvas-wrap { position:relative; background:#fff; border:6px solid #cfd8e3; border-radius:14px; line-height:0;
            box-shadow:0 8px 24px rgba(0,0,0,.12);
            height:100%; width:auto; aspect-ratio:760/470; max-width:100%; max-height:100%; }
        .paint-app canvas { display:block; width:100%; height:100%; object-fit:contain; border-radius:8px; cursor:crosshair; touch-action:none; }
        /* camada de texto: por cima do desenho; não recebe clique (input vai pro canvas de baixo) */
        .paint-app canvas.text-layer { position:absolute; inset:0; pointer-events:none; }
        .paint-app canvas.layer-hidden { opacity:0; }   /* oculta a camada SEM tirar do layout (o fundo precisa receber clique) */

        /* barras flutuantes */
        .paint-app .bar { position:absolute; z-index:3; display:flex; align-items:center; gap:6px; flex-wrap:wrap;
            background:var(--panel); border-radius:14px; padding:8px; box-shadow:0 8px 24px rgba(0,0,0,.20); }
        /* histórico + ferramentas agrupados num pílula duplo, centralizado no topo */
        /* flex centrado: o grupo [histórico][ferramentas] fica centralizado como unidade.
           pointer-events:none no wrapper pra não bloquear o canvas/Fechar nas laterais vazias. */
        .paint-app .top-bars { position:absolute; top:12px; left:0; right:0; z-index:3; pointer-events:none;
            display:flex; justify-content:center; align-items:start; gap:10px; }
        /* topo sem painel: ícones soltos lado a lado (sem fundo/sombra de barra) */
        .paint-app .top-bars .bar { position:static; pointer-events:auto;
            background:none; box-shadow:none; padding:0; border-radius:0; gap:18px; }
        .paint-app .tools-bar { flex-wrap:nowrap; }
        .paint-app .bar-sep { width:2px; align-self:center; height:36px; background:rgba(0,0,0,.18); margin:0 5px; flex:none; border-radius:2px; }
        .paint-app .colors-bar { top:50%; left:var(--canvas-edge); right:auto; transform:translateY(-50%); background:#fff; height:80vh; overflow:auto;
            flex-direction:column; align-items:center; gap:10px; }
        /* coluna à esquerda (fora do canvas), centralizada na vertical: salvar/imprimir/limpar/abrir + sair; visual vem de .pill-btn */
        .paint-app .io-bar { position:absolute; z-index:3; top:50%; left:14px; transform:translateY(-50%);
            display:flex; flex-direction:column; align-items:flex-start; gap:10px; }
        /* Voltar do ateliê: canto superior esquerdo; fecha o modal e volta pra galeria (data-close) */
        .paint-app .atelie-voltar { position:absolute; top:12px; left:14px; z-index:4; }
        .paint-app .atelie-voltar .pill-btn__icon svg { width:22px; height:22px; display:block; }
        .paint-app .size-bar { position:absolute; z-index:3; top:50%; right:var(--canvas-edge); left:auto; transform:translateY(-50%);
            background:#fff; border-radius:14px; padding:12px 10px; box-shadow:0 8px 24px rgba(0,0,0,.20);
            display:flex; flex-direction:column; align-items:center; gap:8px; }

        /* botão de camada (Texto): usa o visual .pill-btn; folga extra abaixo pra destacar do grupo de ações */
        .paint-app .io-bar .layer-btn { margin-bottom:20px; }
        .paint-app .layer-btn.off { opacity:.5; }

        /* controle de zoom: faixa inferior, borda direita alinhada à borda direita do canvas */
        .paint-app .zoom-bar { position:absolute; z-index:3; bottom:14px; right:max(14px, calc(100vw - var(--canvas-edge)));
            display:flex; align-items:center; gap:10px; background:#fff; border-radius:14px; padding:6px 8px;
            box-shadow:0 8px 24px rgba(0,0,0,.20); }
        .paint-app .zoom-btn { width:42px; height:42px; display:grid; place-items:center; border:0; border-radius:10px;
            background:#eef2f7; color:#2b2f36; font-size:18px; cursor:pointer; transition:background .12s ease; }
        .paint-app .zoom-btn:hover { background:#e2e9f2; }
        .paint-app .zoom-val { min-width:54px; text-align:center; font-weight:700; color:#334; font-size:15px; }
        .paint-app .zoom-bar .tool { width:42px; height:42px; min-width:0; padding:0; background:#eef2f7; color:#2b2f36; border-radius:10px; }
        .paint-app .zoom-bar .tool:hover { transform:none; background:#e2e9f2; }
        .paint-app .zoom-bar .tool.sel { background:var(--accent); color:#fff; }

        /* cores */
        .paint-app .swatches { display:grid; grid-template-columns:repeat(2,42px); gap:8px; }
        .paint-app .swatches button { width:42px; height:42px; border:2px solid rgba(0,0,0,.10); border-radius:50%;
            cursor:pointer; padding:0; }
        .paint-app .swatches button.sel { outline:3px solid var(--accent); outline-offset:1px; transform:scale(1.12); }
        /* botão de cor personalizada: abre o seletor nativo do navegador */
        .paint-app .swatch-custom { position:relative; width:92px; height:42px; flex:none; border-radius:12px;
            border:2px solid rgba(0,0,0,.10); cursor:pointer; display:grid; place-items:center;
            font-size:20px; line-height:1; text-shadow:0 1px 2px rgba(0,0,0,.4);
            background:conic-gradient(from .15turn,#ff3b30,#ffcc00,#34c759,#00c7be,#007aff,#af52de,#ff2d92,#ff3b30); }
        .paint-app .swatch-custom.sel { outline:3px solid var(--accent); outline-offset:2px; }

        /* Seletor de cor próprio: modal grande e centralizado (pra criança) */
        .cpick { position:fixed; inset:0; z-index:1200; display:flex; align-items:center; justify-content:center; }
        .cpick[hidden] { display:none; }
        .cpick-backdrop { position:absolute; inset:0; background:rgba(15,23,42,.55); backdrop-filter:blur(2px); }
        .cpick-card { position:relative; z-index:1; background:#fff; border-radius:24px; padding:24px;
            width:min(92vw,560px); box-shadow:0 24px 60px rgba(0,0,0,.35); font-family:'Baloo 2',system-ui,sans-serif; }
        .cpick-x { position:absolute; top:14px; right:14px; z-index:2; }
        .cpick-title { margin:0 56px 16px; text-align:center; font-size:1.7rem; color:#333; }
        .cpick-sv { position:relative; width:100%; aspect-ratio:3/2; border-radius:16px; cursor:crosshair; touch-action:none;
            background:linear-gradient(to top,#000,transparent),linear-gradient(to right,#fff,transparent),hsl(320,100%,50%); }
        .cpick-sv-cursor { position:absolute; width:28px; height:28px; border-radius:50%; border:3px solid #fff;
            box-shadow:0 0 0 1.5px rgba(0,0,0,.45); transform:translate(-50%,-50%); pointer-events:none; }
        .cpick-hue { -webkit-appearance:none; appearance:none; width:100%; height:30px; margin:18px 0; border-radius:15px; cursor:pointer;
            background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00); }
        .cpick-hue::-webkit-slider-thumb { -webkit-appearance:none; width:36px; height:36px; border-radius:50%;
            background:#fff; border:3px solid #888; box-shadow:0 2px 6px rgba(0,0,0,.3); cursor:pointer; }
        .cpick-hue::-moz-range-thumb { width:36px; height:36px; border-radius:50%;
            background:#fff; border:3px solid #888; box-shadow:0 2px 6px rgba(0,0,0,.3); cursor:pointer; }
        .cpick-foot { display:flex; align-items:center; gap:12px; }
        .cpick-preview { width:54px; height:54px; border-radius:50%; border:3px solid rgba(0,0,0,.12); flex:none; margin-right:auto; background:#e23ca0; }
        .cpick-saved { margin-top:18px; border-top:2px solid #eee; padding-top:14px; }
        .cpick-saved-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .cpick-saved-label { font-size:.95rem; font-weight:700; color:#888; }
        .cpick-saved-actions { display:flex; gap:8px; }
        .cpick-add { border:0; border-radius:999px; background:#eef2f7; color:#3a7bd5; font-family:inherit;
            font-weight:700; font-size:.95rem; padding:8px 14px; cursor:pointer; }
        .cpick-add:hover { background:#e2e9f2; }
        .cpick-remove.is-active { background:#fde2e7; color:#e11d48; }
        .cpick-saved-row { display:flex; flex-wrap:wrap; gap:10px; min-height:42px; }
        .cpick-saved-row button { position:relative; width:42px; height:42px; border-radius:50%; border:2px solid rgba(0,0,0,.10);
            cursor:pointer; padding:0; transition:transform .12s ease; }
        .cpick-saved-row button:hover { transform:scale(1.12); }
        .cpick-saved-row.removing button { outline:2px solid #e11d48; outline-offset:1px; }
        .cpick-saved-row.removing button::after { content:'✕'; position:absolute; inset:0; display:grid; place-items:center;
            font-size:20px; font-weight:900; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.75); }

        /* botões */
        /* cada ferramenta = ícone solto (sem fundo); selecionado fica na cor de destaque */
        .paint-app button.tool { width:56px; height:56px; min-width:56px; padding:0; flex:none;
            display:inline-grid; place-items:center; background:none; color:#2b2f36; border:0;
            font-family:inherit; font-weight:700; font-size:36px; line-height:1; cursor:pointer;
            transition:transform .12s ease, color .12s ease; }
        .paint-app button.tool:hover { transform:translateY(-2px); }
        .paint-app button.tool i { font-size:34px; }
        .paint-app button.tool svg { width:38px; height:38px; }   /* seta-bloco (SVG) no mesmo tamanho visual dos ícones */
        .paint-app button.tool.sel { color:var(--accent); }
        .paint-app button.act { width:56px; height:56px; padding:0; display:inline-grid; place-items:center;
            background:none; color:#2b2f36; border:0; font-family:inherit; font-weight:700; font-size:32px;
            cursor:pointer; transition:transform .12s ease; }
        .paint-app button.act:hover { transform:translateY(-2px); }
        /* botão "Desenhos prontos" (galeria) + painel de desenhos pré-definidos */
        .paint-app .gallery-btn i { font-size:32px; }
        .paint-app .gallery-btn.on { color:var(--accent); }
        /* botão de balões: caret indicando que abre opções */
        .paint-app #balloonBtn, .paint-app #galleryBtn { position:relative; }
        .paint-app .tool-caret { position:absolute; right:-16px; top:50%; transform:translateY(-50%); font-size:32px; line-height:1; color:#9aa3af; pointer-events:none; }
        .paint-app #balloonBtn.sel .tool-caret, .paint-app #galleryBtn.on .tool-caret { color:var(--accent); }
        .paint-app .predef-panel { position:absolute; z-index:5; top:78px; left:50%; transform:translateX(-50%);
            background:#fff; border-radius:16px; padding:14px; box-shadow:0 12px 30px rgba(0,0,0,.25);
            display:flex; flex-wrap:wrap; justify-content:center; gap:12px; width:310px; max-width:92vw; max-height:70vh; overflow:auto;
            transform-origin:top center; animation:predefPop .26s cubic-bezier(.34,1.45,.5,1) backwards; }
        .paint-app .predef-panel[hidden] { display:none; }
        /* abertura elegante: o painel "salta" do botão (escala+fade) e os cards sobem em cascata */
        @keyframes predefPop { from { opacity:0; transform:translateX(-50%) translateY(-10px) scale(.9); }
                               to   { opacity:1; transform:translateX(-50%) translateY(0)     scale(1);  } }
        @keyframes predefItemUp { from { opacity:0; transform:translateY(8px) scale(.95); }
                                  to   { opacity:1; transform:none; } }
        .paint-app .predef-item { width:86px; display:flex; flex-direction:column; align-items:center; gap:6px;
            border:2px solid #e3e8ef; border-radius:12px; background:#fff; padding:8px 6px; cursor:pointer;
            transition:transform .12s ease, border-color .12s ease; font-family:inherit;
            animation:predefItemUp .3s ease backwards; }
        .paint-app .predef-item:nth-child(1){ animation-delay:.08s; }
        .paint-app .predef-item:nth-child(2){ animation-delay:.13s; }
        .paint-app .predef-item:nth-child(3){ animation-delay:.18s; }
        .paint-app .predef-item:nth-child(4){ animation-delay:.23s; }
        .paint-app .predef-item:nth-child(5){ animation-delay:.28s; }
        .paint-app .predef-item:nth-child(6){ animation-delay:.33s; }
        .paint-app .predef-item:nth-child(7){ animation-delay:.38s; }
        .paint-app .predef-item:hover { transform:translateY(-2px); border-color:var(--accent); }
        .paint-app .predef-item img { width:62px; height:62px; object-fit:contain; }
        .paint-app .predef-item svg { width:60px; height:60px; color:#2b2f36; }   /* prévia dos balões (SVG) */
        .paint-app .predef-item span { font-size:13px; font-weight:700; color:#334; }
        /* slider vertical: fill por gradiente (enche de baixo até o thumb), thumb redondo custom */
        .paint-app input[type=range] { -webkit-appearance:none; appearance:none; cursor:pointer;
            writing-mode:vertical-lr; direction:rtl; width:16px; height:560px; border-radius:9px;
            background:linear-gradient(to top, #2b6ef6 var(--p,21%), #e3e8ef var(--p,21%)); }
        .paint-app input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none;
            width:24px; height:24px; border-radius:50%; background:#2b6ef6; border:3px solid #fff;
            box-shadow:0 1px 4px rgba(0,0,0,.3); cursor:pointer; }
        .paint-app input[type=range]::-moz-range-thumb { width:24px; height:24px; border:3px solid #fff;
            border-radius:50%; background:#2b6ef6; box-shadow:0 1px 4px rgba(0,0,0,.3); cursor:pointer; }
        .paint-app .val { color:#334; font-weight:700; font-size:12px; }

        /* mini-barra de texto: flutua sob a barra de ferramentas */
        .paint-app .text-tools { top:74px; left:12px; }
        .paint-app .text-tools[hidden] { display:none; }
        .paint-app .text-tools .tt { background:#3a3f47; color:#fff; border:0; border-radius:8px;
            width:36px; height:36px; font-family:inherit; font-size:16px; cursor:pointer; }
        .paint-app .text-tools .tt.sel { background:var(--accent); }
        /* alinhamento vertical: bloquinho que sobe/desce dentro do botão mostrando onde o texto fica */
        .paint-app .text-tools .tt-valign { display:flex; flex-direction:column; padding:6px 0; }
        .paint-app .text-tools .tt-valign span { display:block; width:16px; height:9px; margin:0 auto; background:#fff; border-radius:2px; }
        .paint-app .text-tools .tt-valign.va-top    { justify-content:flex-start; }
        .paint-app .text-tools .tt-valign.va-middle { justify-content:center; }
        .paint-app .text-tools .tt-valign.va-bottom { justify-content:flex-end; }
        .paint-app .text-tools .tt-size { width:62px; height:36px; border-radius:8px; border:0;
            padding:0 8px; font-family:inherit; font-weight:700; font-size:14px; }
        /* dropdown próprio (fonte/tamanho): estilizável e não rouba o foco da digitação */
        .paint-app .text-tools .tt-dd { position:relative; }
        .paint-app .text-tools .tt-dd-cur { position:relative; height:36px; border:0; border-radius:8px; background:#3a3f47; color:#fff;
            font-family:inherit; font-size:15px; padding:0 28px 0 12px; cursor:pointer; white-space:nowrap; }
        .paint-app .text-tools .tt-dd-cur::after { content:'▾'; position:absolute; right:9px; top:50%; transform:translateY(-50%); font-size:12px; opacity:.85; }
        /* a lista é movida pro <body> (fica acima do textarea, sem scroll, opaca e clicável) */
        .tt-dd-list { position:fixed; z-index:3000; background:#2b2f36; border-radius:14px; padding:6px;
            box-shadow:0 16px 38px rgba(0,0,0,.45); display:flex; flex-direction:column; gap:2px;
            font-family:'Baloo 2',system-ui,sans-serif; }
        .tt-dd-list[hidden] { display:none; }
        .tt-dd-opt { border:0; background:transparent; color:#fff; font-family:inherit; font-size:18px;
            text-align:left; padding:9px 16px; border-radius:9px; cursor:pointer; white-space:nowrap; line-height:1.1; }
        .tt-dd-opt:hover { background:#3a3f47; }
        .tt-dd-opt.sel { background:#a23ca0; }
        /* controle de fundo da caixa de texto */
        .paint-app .text-tools .tt-bg-cur { width:42px; height:36px; border:0; border-radius:8px; cursor:pointer; padding:0;
            box-shadow:inset 0 0 0 2px rgba(255,255,255,.25); }
        .paint-app .text-tools .tt-bg-cur.is-none { background:repeating-conic-gradient(#cbd5e1 0% 25%, #fff 0% 50%) 0 / 14px 14px; }
        .tt-bg-pop { width:208px; gap:0 !important; }
        .tt-bg-none { border:0; border-radius:9px; background:#3a3f47; color:#fff; font-family:'Baloo 2',system-ui,sans-serif; font-size:15px;
            padding:9px; cursor:pointer; margin-bottom:8px; }
        .tt-bg-none:hover { background:#4a505a; }

        .tt-bg-grid .tt-bg-sw { width:100%; aspect-ratio:1; border:2px solid rgba(255,255,255,.18); border-radius:50%; cursor:pointer; padding:0; }
        .tt-bg-grid .tt-bg-sw.sel { outline:2px solid #fff; outline-offset:1px; }

        .tt-bg-op input { flex:1; accent-color:#a23ca0; }

        .paint-app .text-tools .tt-bd-cur.is-none { box-shadow:inset 0 0 0 2px rgba(255,255,255,.3); }

        /* Campo de digitação flutuante (texto) — textarea multi-linha sobre a área puxada (canto sup. esq.) */
        .paint-text-input { position:fixed; z-index:1100; box-sizing:border-box; transform:translate(-50%,-50%);
            border:0; background:transparent; padding:0;   /* fundo branco é pintado no canvas (cobre a caixa até a moldura); textarea recuado TEXT_PAD deixa as alças livres */

        .paint-text-input::placeholder { color:currentColor; opacity:.5; }   /* "Digite…" prevê a cor escolhida */

        /* prévia de pincel/borracha: círculo do tamanho exato do traço, ícone no centro (fundo definido por ferramenta no JS) */

        .tool-ring i { font-size:32px; color:#2b2f36; text-shadow:0 0 3px #fff,0 0 3px #fff; }

        /* Telas estreitas: barras menores, slider deitado, canvas com menos margem */

<script>
/* ===== Modal: abrir/fechar ===== */
const paintModal = document.getElementById('paintModal');
const uploadField = document.getElementById('upload').closest('.pill-btn'); // label "Abrir arquivo"
let blankMode = false;
// opts: { blank:true } abre canvas em branco + botão de upload; { img:'...' } carrega a imagem e esconde upload.
function abrirAtelie(opts){
    opts = opts || {};
    blankMode = !!opts.blank;
    loadedImg = null;
    uploadField.style.display = opts.blank ? '' : 'none';   // "Abrir arquivo" só no card em branco
    if(opts.blank){
        blankCanvas();
    } else {
        const img = new Image();
        img.onload  = ()=>{ loadedImg = img; drawImg(img); };
        img.onerror = ()=> drawSample();
        img.src = opts.img || 'colorir/desenho1.jpeg';
    }
    paintModal.hidden = false; document.body.style.overflow = 'hidden';
}
function fecharAtelie(){ paintModal.hidden = true; document.body.style.overflow = ''; }
document.getElementById('abrirAtelie').addEventListener('click', () => abrirAtelie({ blank:true }));
paintModal.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', fecharAtelie));

// Clicar no fundo (fora do card) NÃO fecha: o card balança avisando.
const paintCard = paintModal.querySelector('.paint-modal-card');
paintModal.querySelector('.paint-modal-backdrop').addEventListener('click', () => {
    paintCard.classList.remove('shake');
    void paintCard.offsetWidth;            // força reflow pra re-disparar a animação
    paintCard.classList.add('shake');
});
paintCard.addEventListener('animationend', () => paintCard.classList.remove('shake'));
document.addEventListener('keydown', e => {
    if(paintModal.hidden) return;
    if(!predefPanel.hidden && e.key==='Escape'){ closePredef(); return; }   // Esc fecha primeiro o painel de desenhos prontos
    if(e.key === 'Enter' && pendingShape){ commitPending(); return; }   // Enter fixa a forma flutuante
    if((e.key==='Delete'||e.key==='Backspace') && pendingShape && e.target.tagName!=='INPUT'){ e.preventDefault(); cancelPending(); return; }   // Delete apaga a forma flutuante
    if(e.key === 'Escape'){ if(pendingShape){ cancelPending(); return; } if(curvePhase!==0){ endCurve(false); return; } fecharAtelie(); }
    if((e.key==='h'||e.key==='H') && e.target.tagName!=='INPUT'){ const hb=document.querySelector('.tool[data-tool="hand"]'); if(hb){ hb.click(); e.preventDefault(); } return; }
});
// Clicar num card abre o ateliê: o card "blank" começa em branco (com upload);
// os demais carregam a própria imagem (sem upload).
document.addEventListener('click', e => {
    const card = e.target.closest('.hist-card');
    if(card){ e.preventDefault();
        if(card.dataset.blank) abrirAtelie({ blank:true });
        else abrirAtelie({ img: card.dataset.img }); }
});

/* ===== Ferramenta de pintura (flood-fill por luminância) ===== */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d', { willReadFrequently:true });
const tcv = document.getElementById('tcv');                       // camada separada só pros textos (fica POR CIMA do desenho)
const tctx = tcv.getContext('2d');
let texts=[];                                                     // textos fixados (objetos vivos, redesenhados — não "queimam" no desenho)
function syncTextCanvasSize(){ tcv.width=cv.width; tcv.height=cv.height; }   // a camada de texto acompanha o tamanho do fundo

let color = [226,60,160,255];   // rgba atual
let tool = 'bucket';
let panX=0, panY=0, panning=false, panLast=null;
let brushSize = 14;
let txtBold=true, txtItalic=false, txtUnder=false, txtSize=48;    // estilo da ferramenta Texto (negrito ligado por padrão)
let txtFont="'Baloo 2'";                                          // família de fonte escolhida na mini-barra
let txtBg=null;                                                   // fundo da caixa de texto: padrão transparente (null), ou {r,g,b,a}
let txtBorder=null;                                               // borda da caixa: padrão sem borda (null), ou {r,g,b,a,width}
let txtRadius=20;                                                 // raio dos cantos da caixa (fundo + contorno), em px
let txtAlign='center';                                            // alinhamento horizontal do texto na caixa: left|center|right
let txtVAlign='middle';                                           // alinhamento vertical do texto na caixa: top|middle|bottom
function bgCss(bg){ return bg ? `rgba(${bg.r},${bg.g},${bg.b},${bg.a})` : null; }
function boxPath(g,x,y,w,h,r){ g.beginPath(); if(r>0) g.roundRect(x,y,w,h,Math.min(r,w/2,h/2)); else g.rect(x,y,w,h); }   // caminho do box (cantos arredondados ou retos) no contexto g
const TEXT_FONTS=[{name:'Baloo',css:"'Baloo 2'"},{name:'Gibi',css:"'Comic Neue'"},{name:'Praia',css:"'Pacifico'"},{name:'Mão',css:"'Patrick Hand'"},{name:'Festa',css:"'Luckiest Guy'"}];

// ---- paleta ----
const PALETTE = ['#e63946','#f4791f','#ffb703','#ffd60a','#90be6d','#43aa8b','#4cc9f0','#3a86ff',
  '#4361ee','#7209b7','#b5179e','#e23ca0','#ff6392','#ff9b85','#7f5539','#000000',
  '#ffffff','#adb5bd','#6c757d','#212529','#caffbf','#bdb2ff','#a0c4ff','#ffc6ff'];
const sw = document.getElementById('swatches');
const customBtn = document.getElementById('customColor');
function clearColorSel(){ [...sw.children].forEach(c=>c.classList.remove('sel')); customBtn.classList.remove('sel'); }
function onColorChange(){                                   // cor mudou: recolore o texto em digitação / a forma flutuante ao vivo
  const c=`rgb(${color[0]},${color[1]},${color[2]})`;
  if(txtEdit){ txtEdit.ta.style.color=c; txtEdit.ta.style.caretColor=c; renderTextLayer(); }
  if(pendingShape){ if(pendingShape.type==='text') pendingShape.color=color.slice(); renderPending(); }
}
PALETTE.forEach((hex,i)=>{
  const b=document.createElement('button');
  b.style.background=hex; b.title=hex;
  if(i===11) b.classList.add('sel');
  b.onmousedown=e=>e.preventDefault();                     // não tira o foco da digitação
  b.onclick=()=>{ color=hexToRgba(hex); clearColorSel(); b.classList.add('sel'); onColorChange(); };
  sw.appendChild(b);
});
// cor personalizada: o botão abre o seletor PRÓPRIO (modal grande e central)
customBtn.onclick=()=>abrirColorPicker();
function hexToRgba(h){ const n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255,255]; }

// ---- seletor de cor próprio (modal grande e central): quadrado saturação/brilho + barra de matiz ----
const cpick=document.getElementById('colorPicker'), cpickSV=document.getElementById('cpickSV'),
  cpickCursor=document.getElementById('cpickCursor'), cpickHue=document.getElementById('cpickHue'),
  cpickPreview=document.getElementById('cpickPreview');
let cpHue=320, cpSat=1, cpVal=1, cpDrag=false;
function hsvToRgb(h,s,v){ const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c; let r=0,g=0,b=0;
  if(h<60){r=c;g=x;} else if(h<120){r=x;g=c;} else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;} else if(h<300){r=x;b=c;} else {r=c;b=x;}
  return [Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)]; }
function rgbToHsv(r,g,b){ r/=255;g/=255;b/=255; const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn; let h=0;
  if(d){ if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0)h+=360; }
  return [h, mx?d/mx:0, mx]; }
function cpickRender(){
  cpickSV.style.background='linear-gradient(to top,#000,transparent),linear-gradient(to right,#fff,transparent),hsl('+cpHue+',100%,50%)';
  cpickCursor.style.left=(cpSat*100)+'%'; cpickCursor.style.top=((1-cpVal)*100)+'%';

// ---- undo / redo ----
const undoStack=[], redoStack=[];
function cloneTexts(arr){ return arr.map(s=>JSON.parse(JSON.stringify(s))); }   // cópia profunda (shapes são dados puros)
function snapState(){ return { img: ctx.getImageData(0,0,cv.width,cv.height), texts: cloneTexts(texts) }; }   // estado = desenho (bitmap, inclui formas) + textos (camada)
function restoreState(st){ ctx.putImageData(st.img,0,0); texts=cloneTexts(st.texts); renderTextLayer(); }
function pushUndo(){ if(undoStack.length>=25) undoStack.shift();
  undoStack.push(snapState()); redoStack.length=0; }  // ação nova invalida o redo
document.getElementById('undo').onclick=()=>{
  if(curvePhase!==0){ endCurve(false); return; } // desfaz a curva em andamento
  if(pendingShape){                               // desfaz primeiro a forma que está flutuando
    if(pendingShape.type==='text' && pendingShape._fromLayer){   // texto levantado da camada: devolve (não apaga)
      texts.push(pendingShape); pendingShape=null; pendingSnapshot=null; renderTextLayer(); cv.style.cursor=toolCursor(); updateTextToolsPos(); }
    else cancelPending();
    return; }
  if(undoStack.length>1){ redoStack.push(undoStack.pop());            // guarda o estado atual pro redo
    restoreState(undoStack[undoStack.length-1]); } };
document.getElementById('redo').onclick=()=>{

// ---- coords (canvas escalado com object-fit:contain: desconta a margem
//      letterbox e a escala pra mapear o clique no pixel certo do buffer) ----
function pos(e){
  const r=cv.getBoundingClientRect();
  const scale=Math.min(r.width/cv.width, r.height/cv.height);
  const offX=(r.width  - cv.width *scale)/2;
  const offY=(r.height - cv.height*scale)/2;
  return { x:Math.round((e.clientX-r.left-offX)/scale),
           y:Math.round((e.clientY-r.top -offY)/scale) }; }

// ---- flood fill por COR de origem (preenche a região clicada até o traço preto;
//      como compara com a cor de origem, dá pra repintar por cima de qualquer cor) ----
function floodFill(sx,sy){
  const W=cv.width,H=cv.height;
  const img=ctx.getImageData(0,0,W,H); const d=img.data;
  // traço = pixel escuro E sem cor (preto/cinza). Tinta, mesmo escura, tem
  // saturação, então NÃO conta como traço — por isso dá pra repintar por cima.
  const isLine=(p)=>{ const r=d[p],g=d[p+1],b=d[p+2];
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
    return mx<100 && (mx-mn)<40; };
  const s=(sy*W+sx)*4;
  if(isLine(s)) return;                       // clicou no traço, ignora
  const sr=d[s], sg=d[s+1], sb=d[s+2];        // cor de origem (a região a trocar)
  if(sr===color[0] && sg===color[1] && sb===color[2]) return;  // já está nessa cor
  const TOL=70*70;                            // "mesma região" = cor parecida com a de origem
  const match=(p)=>{ if(isLine(p)) return false;
    const dr=d[p]-sr, dg=d[p+1]-sg, db=d[p+2]-sb;
    return dr*dr+dg*dg+db*db <= TOL; };
  const done=new Uint8Array(W*H);
  const can=(i)=> !done[i] && match(i*4);
  const stack=[[sx,sy]];
  while(stack.length){
    let [x,y]=stack.pop();
    while(y>=0 && can(y*W+x)) y--;
    y++; let left=false,right=false;
    while(y<H && can(y*W+x)){
      const i=y*W+x; done[i]=1; const p=i*4;
      d[p]=color[0]; d[p+1]=color[1]; d[p+2]=color[2]; d[p+3]=255;
      if(x>0){ if(can(i-1)){ if(!left){ stack.push([x-1,y]); left=true; } } else left=false; }
      if(x<W-1){ if(can(i+1)){ if(!right){ stack.push([x+1,y]); right=true; } } else right=false; }
      y++;
    }
  }
  // dilatação: espalha a cor sobre o anti-alias (pixels que não são traço) até o
  // núcleo da linha — 2 passes pra matar o halo claro junto às bordas.
  for(let pass=0; pass<2; pass++){
    const base=new Uint8Array(done);
    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      const i=y*W+x; if(base[i]) continue; const p=i*4;
      if(isLine(p)) continue;                 // traço fica preto
      if((x>0&&base[i-1])||(x<W-1&&base[i+1])||(y>0&&base[i-W])||(y<H-1&&base[i+W])){
        d[p]=color[0]; d[p+1]=color[1]; d[p+2]=color[2]; d[p+3]=255; done[i]=1;
      }
    }
  }
  ctx.putImageData(img,0,0);
}

// ---- pincel/borracha ----
let drawing=false,last=null;
function paintDot(x,y){ ctx.beginPath();
  ctx.fillStyle = tool==='eraser' ? '#fff' : `rgb(${color[0]},${color[1]},${color[2]})`;
  ctx.arc(x,y,brushSize/2,0,Math.PI*2); ctx.fill(); }
function paintLine(a,b){ ctx.strokeStyle = tool==='eraser' ? '#fff' : `rgb(${color[0]},${color[1]},${color[2]})`;
  ctx.lineWidth=brushSize; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }

// ---- formas prontas (linha/triângulo/quadrado/círculo): arrasta do início ao fim ----
// (a curva tem desenho próprio de 3 arrastos, mas no fim vira a MESMA forma flutuante)
const SHAPES=['line','triangle','rect','rrect','ellipse','pentagon','hexagon','star','heart','arrow','speech','rectspeech','oval','funbubble','cloudspeech','burst','thought'];
let shaping=false, shapeStart=null, snapshot=null;
let textDragging=false, textStart=null, textSnap=null;     // arraste que define a caixa de texto (estilo Paint)
let textJustCommitted=false;                               // engole o clique que fechou a edição (pra a forma ficar com alças, não queimar na hora)
let textEditorOpen=false;                                  // textarea de texto aberta agora: clique no canvas só fecha/comita (não cria 2ª caixa)
let txtEdit=null, editDrag=null;                           // sessão de digitação ativa (geometria mutável) + arraste de alça durante a digitação
// forma = centro (cx,cy) + tamanho (w,h) + rotação (rot); flip = diagonal da linha.
function shapeFromPoints(a,b,type){ type=type||tool; const dx=b.x-a.x, dy=b.y-a.y;
  return { type, cx:(a.x+b.x)/2, cy:(a.y+b.y)/2,
           w:Math.abs(dx), h:Math.abs(dy), rot:0, flip:(dx*dy<0) }; }
// desenha UM texto no contexto g (camada de texto). cor = a do próprio texto (s.color), não a cor atual do balde/pincel.
function drawText(s,g){ g.save(); g.translate(s.cx,s.cy); g.rotate(s.rot);
  const r=s.radius||0, col=s.color||color;
  if(s.bg){ g.fillStyle=bgCss(s.bg); boxPath(g,-s.w/2,-s.h/2,s.w,s.h,r); g.fill(); }   // fundo da caixa (cor/opacidade escolhidas)
  if(s.border && s.border.width>0){ const bw=s.border.width; g.lineWidth=bw; g.strokeStyle=bgCss(s.border);   // contorno por dentro da caixa
    boxPath(g,-s.w/2+bw/2,-s.h/2+bw/2, s.w-bw, s.h-bw, Math.max(0,r-bw/2)); g.stroke(); }
  g.font=textFont(s); g.textAlign='left'; g.textBaseline='top';                          // posiciona cada linha "na mão" (alinhamento H)
  g.fillStyle=`rgb(${col[0]},${col[1]},${col[2]})`;
  const lh=lineHeight(s), lines=s.lines||wrapText(s);
  const innerL=-s.w/2+TEXT_PAD, innerR=s.w/2-TEXT_PAD, innerW=Math.max(0,innerR-innerL), blockH=lines.length*lh;
  let y = s.valign==='middle' ? -blockH/2                                                // bloco de texto dentro da altura da caixa
        : s.valign==='bottom' ? s.h/2-TEXT_PAD-blockH
        : -s.h/2+TEXT_PAD;                                                                // top (default)
  for(const ln of lines){ const lw=g.measureText(ln).width;
    const x = s.halign==='center' ? innerL+(innerW-lw)/2 : s.halign==='right' ? innerR-lw : innerL;
    g.fillText(ln,x,y);
    if(s.underline && ln){ const uy=y+s.fontSize;                                         // sublinhado por linha
      g.strokeStyle=`rgb(${col[0]},${col[1]},${col[2]})`; g.lineWidth=Math.max(1,s.fontSize*0.06);
      g.beginPath(); g.moveTo(x,uy); g.lineTo(x+lw,uy); g.stroke(); }
    y+=lh; }
  g.restore(); }
// nuvem: contorno ondulado por curvas quadráticas (sem linhas internas). Se `tip`, um gomo vira rabicho pontudo.
function cloudPath(g, hw, hh, tip){
  const N=9, rx=hw*0.66, ry=hh*0.56, bulge=Math.min(hw,hh)*0.34;
  const pts=[]; for(let i=0;i<N;i++){ const a=i/N*2*Math.PI - Math.PI/2; pts.push({x:Math.cos(a)*rx, y:Math.sin(a)*ry}); }
  let tailSeg=-1;
  if(tip){ let bestDot=-Infinity; for(let i=0;i<N;i++){ const p=pts[i], q=pts[(i+1)%N], mx=(p.x+q.x)/2, my=(p.y+q.y)/2, L=Math.hypot(mx,my)||1;
    const dot=(tip.x*mx+tip.y*my)/L; if(dot>bestDot){ bestDot=dot; tailSeg=i; } } }   // gomo mais virado pra ponta
  g.moveTo(pts[0].x, pts[0].y);
  for(let i=0;i<N;i++){ const p=pts[i], q=pts[(i+1)%N];
    if(i===tailSeg){ g.lineTo(tip.x,tip.y); g.lineTo(q.x,q.y); }   // esse gomo vira o rabicho pontudo
    else { const mx=(p.x+q.x)/2, my=(p.y+q.y)/2, L=Math.hypot(mx,my)||1;
      g.quadraticCurveTo(mx+mx/L*bulge, my+my/L*bulge, q.x, q.y); } }   // empurra o controle pra fora (radial) = bolha
  g.closePath();
}
// balão de fala: retângulo (arredondado por rf) + rabicho saindo do lado mais próximo da ponta (tx,ty pode ficar fora da caixa)
function speechBalloonPath(g, hw, hh, tx, ty, rf){
  const r=Math.max(2, Math.min(hw,hh)*(rf||0.28)), nh=Math.min(hw,hh)*0.18;     // raio do canto + meia-base do rabicho
  const nx=tx/hw, ny=ty/hh;
  const side = Math.abs(nx)>=Math.abs(ny) ? (nx>=0?'R':'L') : (ny>=0?'B':'T');   // lado por onde o rabicho sai
  const bcx=Math.max(-hw+r+nh, Math.min(hw-r-nh, tx));                     // base presa entre os cantos (borda horizontal)
  const bcy=Math.max(-hh+r+nh, Math.min(hh-r-nh, ty));                     // base presa entre os cantos (borda vertical)
  g.moveTo(-hw+r,-hh);
  if(side==='T'){ g.lineTo(bcx-nh,-hh); g.lineTo(tx,ty); g.lineTo(bcx+nh,-hh); }   // rabicho no topo
  g.lineTo(hw-r,-hh); g.arcTo(hw,-hh,hw,-hh+r,r);
  if(side==='R'){ g.lineTo(hw,bcy-nh); g.lineTo(tx,ty); g.lineTo(hw,bcy+nh); }     // rabicho na direita
  g.lineTo(hw,hh-r); g.arcTo(hw,hh,hw-r,hh,r);
  if(side==='B'){ g.lineTo(bcx+nh,hh); g.lineTo(tx,ty); g.lineTo(bcx-nh,hh); }     // rabicho embaixo
  g.lineTo(-hw+r,hh); g.arcTo(-hw,hh,-hw,hh-r,r);
  if(side==='L'){ g.lineTo(-hw,bcy+nh); g.lineTo(tx,ty); g.lineTo(-hw,bcy-nh); }   // rabicho na esquerda
  g.lineTo(-hw,-hh+r); g.arcTo(-hw,-hh,-hw+r,-hh,r);
  g.closePath();
}
// balão de 4 cantos LIVRES (inclinado/divertido): cantos arredondados + rabicho na borda mais virada pra ponta
function balloonQuadPath(g, C, tx, ty, r, nh){
  const n=C.length, cx=(C[0].x+C[1].x+C[2].x+C[3].x)/4, cy=(C[0].y+C[1].y+C[2].y+C[3].y)/4;
  let best=0, bestDot=-Infinity;                                   // borda mais virada pra ponta
  for(let i=0;i<n;i++){ const a=C[i], b=C[(i+1)%n], mx=(a.x+b.x)/2, my=(a.y+b.y)/2, dx=mx-cx, dy=my-cy, L=Math.hypot(dx,dy)||1;
    const dot=((tx-cx)*dx+(ty-cy)*dy)/L; if(dot>bestDot){ bestDot=dot; best=i; } }
  g.moveTo((C[n-1].x+C[0].x)/2,(C[n-1].y+C[0].y)/2);              // começa no meio da última borda
  for(let i=0;i<n;i++){ const A=C[i], B=C[(i+1)%n];
    g.arcTo(A.x,A.y, B.x,B.y, r);                                  // arredonda o canto A indo pra B
    if(i===best){                                                  // emenda o rabicho na borda A->B
      const eL=Math.hypot(B.x-A.x,B.y-A.y)||1, ux=(B.x-A.x)/eL, uy=(B.y-A.y)/eL, lo=r+nh, hi=eL-r-nh;
      let t=(tx-A.x)*ux+(ty-A.y)*uy; t = hi>lo ? Math.max(lo,Math.min(hi,t)) : eL/2;
      g.lineTo(A.x+ux*(t-nh), A.y+uy*(t-nh)); g.lineTo(tx,ty); g.lineTo(A.x+ux*(t+nh), A.y+uy*(t+nh)); }
  }
  g.closePath();
}
function drawShapeT(s, g){ g=g||ctx;
  if(s.type==='text'){ drawText(s, g); return; }             // texto mora na camada de texto
  g.save(); g.translate(s.cx,s.cy); g.rotate(s.rot);         // desenha centrado e girado
  if(s.type==='predef'){                                     // desenho pronto (line-art PNG): carimba a imagem na caixa
    const p=PREDEF[s.draw];
    if(p && p.img) g.drawImage(p.img, -s.w/2, -s.h/2, s.w, s.h);
    g.restore(); return;
  }
  g.strokeStyle=`rgb(${color[0]},${color[1]},${color[2]})`;
  g.lineWidth=brushSize; g.lineCap='round'; g.lineJoin='round';
  const hw=s.w/2, hh=s.h/2;
  g.beginPath();
  if(s.type==='line'){ if(s.flip){ g.moveTo(-hw,hh); g.lineTo(hw,-hh); } else { g.moveTo(-hw,-hh); g.lineTo(hw,hh); } }
  else if(s.type==='triangle'){ g.moveTo(0,-hh); g.lineTo(-hw,hh); g.lineTo(hw,hh); g.closePath(); }
  else if(s.type==='rect'){ const rad=Math.min(hw,hh)*(s.aRad??0); if(rad>0) g.roundRect(-hw,-hh,s.w,s.h,rad); else g.rect(-hw,-hh,s.w,s.h); }   // canto arredondável pela alça laranja
  else if(s.type==='rrect'){ g.roundRect(-hw,-hh,s.w,s.h, Math.min(hw,hh)*0.35); }
  else if(s.type==='ellipse'){ g.ellipse(0,0,hw,hh,0,0,Math.PI*2); }
  else if(s.type==='pentagon' || s.type==='hexagon'){ const n=s.type==='pentagon'?5:6;   // polígono regular na caixa
    for(let i=0;i<n;i++){ const a=-Math.PI/2 + i*2*Math.PI/n, x=Math.cos(a)*hw, y=Math.sin(a)*hh; i?g.lineTo(x,y):g.moveTo(x,y); } g.closePath(); }
  else if(s.type==='star'){ const sp=5;   // estrela de 5 pontas (raio externo/interno)
    for(let i=0;i<sp*2;i++){ const a=-Math.PI/2 + i*Math.PI/sp, rad=(i%2?0.45:1), x=Math.cos(a)*hw*rad, y=Math.sin(a)*hh*rad; i?g.lineTo(x,y):g.moveTo(x,y); } g.closePath(); }
  else if(s.type==='heart'){ g.moveTo(0,hh*0.9);
    g.bezierCurveTo(-hw*1.05,-hh*0.1, -hw*0.55,-hh, 0,-hh*0.35);
    g.bezierCurveTo( hw*0.55,-hh,  hw*1.05,-hh*0.1, 0,hh*0.9); g.closePath(); }
  else if(s.type==='arrow'){ const ah=hh*(s.aBody??0.38), bx=hw*(s.aNeck??0.1);   // seta-bloco; pescoço ajustável: aBody=espessura do corpo, aNeck=onde a cabeça começa
    g.moveTo(-hw,-ah); g.lineTo(bx,-ah); g.lineTo(bx,-hh);
    g.lineTo(hw,0); g.lineTo(bx,hh); g.lineTo(bx,ah); g.lineTo(-hw,ah); g.closePath(); }
  else if(s.type==='speech'){ const tx=hw*(s.aTailX??-0.4), ty=hh*(s.aTailY??1.35);   // balão de FALA arredondado (rabicho na ponta livre)
    speechBalloonPath(g, hw, hh, tx, ty); }
  else if(s.type==='rectspeech'){ const tx=hw*(s.aTailX??-0.4), ty=hh*(s.aTailY??1.35);   // balão RETANGULAR (cantos quase retos)
    speechBalloonPath(g, hw, hh, tx, ty, 0.06); }
  else if(s.type==='oval'){ const tx=hw*(s.aTailX??-0.4), ty=hh*(s.aTailY??1.35);   // balão OVAL (elipse) + rabicho na direção da ponta
    const a=Math.atan2(ty/Math.max(1,hh), tx/Math.max(1,hw)), d=0.3;
    g.ellipse(0,0,Math.max(2,hw),Math.max(2,hh),0, a+d, a-d+2*Math.PI);   // arco grande (deixa um vão na direção da ponta)
    g.lineTo(tx,ty); g.lineTo(hw*Math.cos(a+d), hh*Math.sin(a+d)); g.closePath(); }
  else if(s.type==='funbubble'){ const tx=hw*(s.aTailX??-0.4), ty=hh*(s.aTailY??1.35);   // balão INCLINADO/divertido: canto sup. ESQUERDO mais alto que o direito
    const C=[{x:-hw,y:-hh},{x:hw,y:-hh*0.45},{x:hw,y:hh*0.72},{x:-hw,y:hh*0.55}];
    balloonQuadPath(g, C, tx, ty, Math.min(hw,hh)*0.22, Math.min(hw,hh)*0.2); }
  else if(s.type==='cloudspeech'){ const tx=hw*(s.aTailX??-0.4), ty=hh*(s.aTailY??1.35);   // NUVEM com rabicho pontudo
    cloudPath(g, hw, hh, {x:tx, y:ty}); }
  else if(s.type==='burst'){ const N=12, ro=1, ri=0.74;   // GRITO/explosão: zigue-zague; 1 spike vira o rabicho (ponta de fala puxável)
    const tx=hw*(s.aTailX??-0.4), ty=hh*(s.aTailY??1.35), tipA=Math.atan2(ty/Math.max(1,hh), tx/Math.max(1,hw));
    let bestI=0, bestD=Infinity;
    for(let i=0;i<N*2;i+=2){ const a=-Math.PI/2+i*Math.PI/N; let d=Math.abs(a-tipA)%(2*Math.PI); if(d>Math.PI)d=2*Math.PI-d; if(d<bestD){bestD=d;bestI=i;} }
    for(let i=0;i<N*2;i++){ const a=-Math.PI/2+i*Math.PI/N, rad=(i%2?ri:ro);
      const x = i===bestI? tx : Math.cos(a)*hw*rad, y = i===bestI? ty : Math.sin(a)*hh*rad;
      i?g.lineTo(x,y):g.moveTo(x,y); }
    g.closePath(); }
  else if(s.type==='thought'){ cloudPath(g, hw, hh);   // PENSAMENTO: corpo nuvem + bolhas saindo em direção à ponta
    const tx=hw*(s.aTailX??-0.4), ty=hh*(s.aTailY??1.35), m=Math.min(hw,hh);
    const a=Math.atan2(ty/Math.max(1,hh), tx/Math.max(1,hw));
    const ex=Math.cos(a)*hw*0.8, ey=Math.sin(a)*hh*0.72;        // ponto na borda da nuvem em direção à ponta
    const b1x=ex+(tx-ex)*0.45, b1y=ey+(ty-ey)*0.45, r1=m*0.13;  // bolha maior
    const b2x=ex+(tx-ex)*0.8,  b2y=ey+(ty-ey)*0.8,  r2=m*0.08;  // bolha menor
    g.moveTo(b1x+r1,b1y); g.arc(b1x,b1y,r1,0,Math.PI*2);
    g.moveTo(b2x+r2,b2y); g.arc(b2x,b2y,r2,0,Math.PI*2); }
  else if(s.type==='curve'){ const q=s.pts;   // bézier guardada normalizada (-1..1) na caixa
    g.moveTo(q[0].x*hw,q[0].y*hh); g.bezierCurveTo(q[1].x*hw,q[1].y*hh,q[2].x*hw,q[2].y*hh,q[3].x*hw,q[3].y*hh); }
  g.stroke(); g.restore();
}

// ---- texto: vira a MESMA forma flutuante (mover/girar/escalar) das demais ----
function textFont(s){ return (s.italic?'italic ':'')+(s.bold?'700':'400')+' '+s.fontSize+'px '+(s.font||"'Baloo 2'")+',system-ui,sans-serif'; }
function lineHeight(s){ return s.fontSize*1.25; }
const TEXT_PAD=12;                                           // respiro interno da caixa (px): recua o textarea da moldura, deixando as alças (na borda) livres pra clicar
// Quebra o texto na largura da caixa (s.w): respeita \n e parte palavras gigantes por caractere.
function wrapText(s){
  ctx.save(); ctx.font=textFont(s);
  const maxW=Math.max(8, (s.w||40)-2*TEXT_PAD), out=[];
  const breakWord=(word)=>{ let cur='';                       // palavra maior que a caixa: quebra letra a letra
    for(const ch of word){ if(!cur || ctx.measureText(cur+ch).width<=maxW){ cur+=ch; }
      else { out.push(cur); cur=ch; } }
    return cur; };
  String(s.text).split('\n').forEach(para=>{
    let line='';
    para.split(' ').forEach(word=>{
      const test=line?line+' '+word:word;
      if(ctx.measureText(test).width<=maxW){ line=test; return; }
      if(line){ out.push(line); line=''; }
      line = ctx.measureText(word).width<=maxW ? word : breakWord(word); });
    out.push(line); });
  ctx.restore();
  return out.length?out:[''];
}
function measureText(s){ s.lines=wrapText(s);                 // largura (s.w) é independente
  s.minH=s.lines.length*lineHeight(s)+2*TEXT_PAD;             // piso: altura colada no texto
  if(s.h===undefined || s.h<s.minH) s.h=s.minH; }            // altura da caixa pode ser MAIOR (manual), nunca menor que o texto
function makeText(text,cx,cy,w){ const s={ type:'text', text, cx, cy, rot:0,
  fontSize:txtSize, bold:txtBold, italic:txtItalic, underline:txtUnder, font:txtFont, bg: txtBg?{...txtBg}:null, border: txtBorder?{...txtBorder}:null, radius:txtRadius,
  halign:txtAlign, valign:txtVAlign, color: color.slice(), w:w||40 };
  if(!w){ ctx.save(); ctx.font=textFont(s);                   // sem largura definida: usa a linha mais larga, limitada a 90% do canvas
    let nat=0; String(text).split('\n').forEach(l=>{ nat=Math.max(nat, ctx.measureText(l).width); });
    ctx.restore(); s.w=Math.max(40, Math.min(nat+10, cv.width*0.9)); }
  measureText(s); return s; }
// canvas -> tela (inverso de pos()): ancora a caixa de digitação sobre o ponto/forma.
function canvasToScreen(cx,cy){ const r=cv.getBoundingClientRect();
  const scale=Math.min(r.width/cv.width, r.height/cv.height);
  const offX=(r.width-cv.width*scale)/2, offY=(r.height-cv.height*scale)/2;
  return { x:r.left+offX+cx*scale, y:r.top+offY+cy*scale, scale }; }
const DEFAULT_TEXT_W=280;
// Caixa de digitação multi-linha sobre o canvas (estilo Paint): Enter = nova linha,
// Ctrl+Enter / clicar fora = confirma, Esc = cancela. Reusada pra criar (sem shape) e reeditar (com shape).
function openTextEditor(opts){
  const reedit=!!opts.shape, s=opts.shape;
  if(reedit){ txtFont=s.font||txtFont; txtSize=s.fontSize; txtBold=s.bold; txtItalic=s.italic; txtUnder=s.underline; txtBg=s.bg?{...s.bg}:null; txtBorder=s.border?{...s.border}:null; txtRadius=s.radius||0; txtAlign=s.halign||'left'; txtVAlign=s.valign||'top'; if(s.color) color=s.color.slice(); syncTextToolbar(); }   // reedição: a barra reflete o estilo do texto
  const sty = reedit ? s : { italic:txtItalic, bold:txtBold, fontSize:txtSize, font:txtFont };
  const scale = canvasToScreen(0,0).scale;
  const ta=document.createElement('textarea');
  ta.className='paint-text-input'; ta.value=reedit?s.text:''; ta.placeholder='Digite…'; ta.rows=1;
  ta.style.font=textFont({ italic:sty.italic, bold:sty.bold, fontSize:Math.round(sty.fontSize*scale), font:sty.font });
  ta.style.color=`rgb(${color[0]},${color[1]},${color[2]})`;
  // sessão de edição: geometria MUTÁVEL da caixa — as alças mexem aqui durante a digitação
  const ed={ ta, reedit, scale, fontSize:sty.fontSize,
    cx: reedit?s.cx:opts.cx, cy: reedit?s.cy:opts.cy,
    w: reedit?s.w:(opts.w||DEFAULT_TEXT_W), rot: reedit?s.rot:0,
    h: reedit ? s.h : (opts.h && opts.h>20 ? opts.h : 0),                                          // altura desejada da caixa (0 = auto/cola no texto)
    halign: reedit ? (s.halign||'left') : txtAlign,
    valign: reedit ? (s.valign||'top') : txtVAlign,
    taH(){ return this.ta.offsetHeight/this.scale; },                                              // altura só do texto (sem respiro)
    minH(){ return this.taH() + 2*TEXT_PAD; },                                                     // altura mínima da caixa (cola no texto)
    curH(){ return Math.max(this.h||0, this.minH()); },                                            // caixa pode ser MAIOR (manual), nunca menor que o texto
    place(){ const H=this.curH(), taH=this.taH();                                                  // recua o textarea TEXT_PAD; posiciona conforme o alinhamento vertical
      let ty = this.valign==='middle' ? 0
             : this.valign==='bottom' ? H/2-TEXT_PAD-taH/2
             : -H/2+TEXT_PAD+taH/2;                                                                 // top (default)
      const ox=-ty*Math.sin(this.rot), oy=ty*Math.cos(this.rot);                                   // desloca o centro do textarea no eixo local (girado)
      const q=canvasToScreen(this.cx+ox, this.cy+oy);
      ta.style.left=q.x+'px'; ta.style.top=q.y+'px';
      ta.style.width=(Math.max(8,this.w-2*TEXT_PAD)*this.scale)+'px';
      ta.style.textAlign=this.halign;
      ta.style.transform='translate(-50%,-50%) rotate('+this.rot+'rad)'; },                        // gira junto com a moldura
    paint(){ renderTextLayer(); updateTextToolsPos(); } };   // redesenha a camada de texto (o aid de edição é desenhado lá quando txtEdit está ativo)
  txtEdit=ed; textEditorOpen=true;
  ed.place(); document.body.appendChild(ta); ed.paint();
  const grow=()=>{ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; ed.place(); ed.paint(); };
  ta.addEventListener('input',grow);
  setTimeout(()=>{ ta.focus(); ta.select(); grow(); },0);
  let done=false;
  function finish(commit){ if(done) return; done=true; textEditorOpen=false; txtEdit=null; editDrag=null;
    const val=ta.value.replace(/\s+$/,''); ta.remove();
    if(reedit){
      if(commit && !val){ cancelPending(); return; }           // apagou tudo: remove o texto
      if(commit){ s.text=val; s.cx=ed.cx; s.cy=ed.cy; s.w=ed.w; s.h=ed.curH(); s.rot=ed.rot;
        s.bold=txtBold; s.italic=txtItalic; s.underline=txtUnder; s.fontSize=txtSize; s.font=txtFont; s.bg=txtBg?{...txtBg}:null; s.border=txtBorder?{...txtBorder}:null; s.radius=txtRadius;
        s.halign=txtAlign; s.valign=txtVAlign; s.color=color.slice(); measureText(s); }   // persiste o estilo (incl. cor/alinhamento/altura) escolhido na reedição
      renderPending();
    } else if(commit && val){
      pendingShape=makeText(val, ed.cx, ed.cy, ed.w); pendingShape.rot=ed.rot;
      pendingShape.halign=txtAlign; pendingShape.valign=txtVAlign; pendingShape.h=ed.curH(); pendingSnapshot=null; measureText(pendingShape); renderPending();
    } else { renderTextLayer(); }                              // cancelou/sem texto: limpa o aid de edição da camada
    if(pendingShape){ textJustCommitted=true; setTimeout(()=>{ textJustCommitted=false; },0); }   // mantém as alças; o clique que fechou não queima
  }
  ed.finish=finish;
  ta.addEventListener('keydown',ev=>{ ev.stopPropagation();    // não vaza teclas pro app/modal
    if(ev.key==='Escape'){ ev.preventDefault(); finish(false); }
    else if(ev.key==='Enter' && (ev.ctrlKey||ev.metaKey)){ ev.preventDefault(); finish(true); } });   // Enter sozinho = nova linha
  ta.addEventListener('blur',ev=>{ if(editDrag){ setTimeout(()=>ta.focus(),0); return; }              // arrastando alça: não comita
    if(ev.relatedTarget && ev.relatedTarget.closest('.text-tools, .tt-dd-list, .colors-bar, #colorPicker')) return;   // foco foi pra UI de estilo/cor: não comita (mantém a caixa)
    finish(true); });
}

// ---- forma flutuante: depois de desenhar fica "solta" sobre um snapshot pra mover,
//      redimensionar (cantos) e girar (alça verde); só vira parte do desenho ao fixar
//      (clique fora / Enter / trocar de ferramenta / salvar). ----
let pendingShape=null, pendingSnapshot=null, dragMode=null, dragLast=null, dragMoved=false;
const HANDLE_R=14, ROT_OFF=76;                              // raio de toque das alças / haste do giro (alta o bastante p/ a alça verde passar acima da mini-barra de estilo)
// cursor de girar (SVG inline) + vetor de saída de cada alça (pra escolher a seta de redimensionar)
const ROT_SVG='<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 5V2L8 6l4 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z" fill="#111" stroke="#fff" stroke-width="1"/></svg>';
const ROTATE_CURSOR='url("data:image/svg+xml,'+encodeURIComponent(ROT_SVG)+'") 12 12, auto';
// cursores das ferramentas balde/borracha: gerados a partir dos MESMOS ícones FontAwesome
// da barra (fa-fill-drip / fa-eraser). Rasteriza o glyph da fonte num canvas e usa como cursor — sem PNG.
let BUCKET_CURSOR='crosshair', BUCKET_CURSOR_DOWN='crosshair', ERASER_CURSOR='crosshair', BRUSH_CURSOR='crosshair';
function faCursor(glyph, fill, size, hotX, hotY){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const x=c.getContext('2d');
  x.font='900 '+Math.round(size*0.72)+"px 'Font Awesome 6 Free'";   // 900 = peso do estilo solid
  x.textAlign='center'; x.textBaseline='middle';
  x.lineJoin='round'; x.lineWidth=Math.max(2,size*0.10); x.strokeStyle='#fff';   // contorno branco pra contraste
  x.strokeText(glyph, size/2, size/2);
  x.fillStyle=fill; x.fillText(glyph, size/2, size/2);
  return "url('"+c.toDataURL()+"') "+hotX+" "+hotY+", auto";
}
function buildToolCursors(){
  BUCKET_CURSOR      = faCursor('', '#2b2f36', 44, 36, 26);   // fa-fill-drip (clique na pontinha da gota)
  BUCKET_CURSOR_DOWN = faCursor('', '#a23ca0', 44, 36, 26);   // pressionado: cor de destaque
  ERASER_CURSOR      = faCursor('', '#2b2f36', 44, 10, 38);   // fa-eraser
  BRUSH_CURSOR       = faCursor('', '#2b2f36', 44, 8, 38);   // fa-paintbrush (clique na ponta das cerdas)
  if(tool==='bucket'||tool==='eraser'||tool==='brush') cv.style.cursor=toolCursor();   // atualiza se a ferramenta já estiver ativa
}
// espera o FontAwesome carregar antes de rasterizar os glyphs (senão sai vazio)
if(document.fonts && document.fonts.load){
  document.fonts.load("900 24px 'Font Awesome 6 Free'").then(buildToolCursors, buildToolCursors);
} else { buildToolCursors(); }
// cursor do canvas por ferramenta (balde = ícone; pincel/borracha = anel; resto = crosshair)
function toolCursor(){ return tool==='hand' ? 'grab' : tool==='bucket' ? BUCKET_CURSOR : (tool==='eraser'||tool==='brush') ? 'none' : 'crosshair'; }

// ---- prévia de pincel/borracha: círculo do tamanho exato do traço, com o ícone da ferramenta no centro
//      (cursor escondido — o anel é o ponteiro, centrado no ponto que pinta/apaga) ----
const toolRing=document.createElement('div'); toolRing.className='tool-ring';
const toolRingIcon=document.createElement('i'); toolRing.appendChild(toolRingIcon); document.body.appendChild(toolRing);
let lastRingEvt=null;
function updateToolRing(e){
  if(e) lastRingEvt=e;
  if((tool!=='eraser'&&tool!=='brush') || !lastRingEvt){ toolRing.style.display='none'; return; }
  const r=cv.getBoundingClientRect(), d=brushSize*(r.width/cv.width);   // diâmetro na tela = tamanho do pincel × escala do canvas (já inclui o zoom)
  toolRing.style.width=d+'px'; toolRing.style.height=d+'px';
  toolRing.style.left=lastRingEvt.clientX+'px'; toolRing.style.top=lastRingEvt.clientY+'px';
  if(tool==='eraser'){ toolRing.style.background='rgba(255,255,255,.5)'; toolRingIcon.className='fa-solid fa-eraser'; toolRingIcon.style.transform=''; }
  else { toolRing.style.background=`rgba(${color[0]},${color[1]},${color[2]},.45)`; toolRingIcon.className='fa-solid fa-paintbrush';
    toolRingIcon.style.transform='translate(8px,-11px)'; }   // pincel: anel na cor atual; ícone deslocado pra ponta das cerdas cair no centro
  toolRing.style.display='grid';
}
cv.addEventListener('pointermove', updateToolRing);
cv.addEventListener('pointerdown', updateToolRing);
cv.addEventListener('pointerenter', updateToolRing);
cv.addEventListener('pointerleave', ()=>{ toolRing.style.display='none'; lastRingEvt=null; });
const HVEC={ e:[1,0], w:[-1,0], n:[0,-1], s:[0,1], ne:[1,-1], nw:[-1,-1], se:[1,1], sw:[-1,1] };
function applyCursor(mode){                                 // troca o cursor pra deixar claro a ação
  if(!mode){ cv.style.cursor=toolCursor(); return; }
  if(mode==='rotate'){ cv.style.cursor=ROTATE_CURSOR; return; }
  if(mode==='adjust'){ cv.style.cursor='default'; return; }
  if(mode==='delete'){ cv.style.cursor='pointer'; return; }
  if(mode==='move'){ cv.style.cursor='move'; return; }
  const [vx,vy]=HVEC[mode], r=pendingShape?pendingShape.rot:0;            // gira o vetor da alça pra tela
  const wx=vx*Math.cos(r)-vy*Math.sin(r), wy=vx*Math.sin(r)+vy*Math.cos(r);
  let a=((Math.atan2(wy,wx)*180/Math.PI)%180+180)%180;                    // seta de resize alinhada à rotação
  cv.style.cursor = a<22.5||a>=157.5 ? 'ew-resize' : a<67.5 ? 'nwse-resize' : a<112.5 ? 'ns-resize' : 'nesw-resize';
}
function toLocal(s,p){ const dx=p.x-s.cx, dy=p.y-s.cy;      // ponteiro no espaço local (sem rotação) da forma
  const c=Math.cos(-s.rot), sn=Math.sin(-s.rot);
  return { x:dx*c - dy*sn, y:dx*sn + dy*c }; }
function hitHandle(s,p){ const l=toLocal(s,p), hw=s.w/2, hh=s.h/2;
  if(ADJUSTABLE[s.type]){ const ap=adjustPos(s);                          // alça de ajuste (laranja) — tem prioridade
    if(ap && Math.hypot(l.x-ap.x, l.y-ap.y)<=HANDLE_R) return 'adjust'; }
  if(Math.hypot(l.x-(hw+24), l.y+hh+24)<=28) return 'delete';            // ✕ vermelho gigante fora do canto sup. direito
  if(Math.hypot(l.x, l.y+hh+ROT_OFF)<=HANDLE_R) return 'rotate';
  const pts=[['nw',-hw,-hh],['ne',hw,-hh],['se',hw,hh],['sw',-hw,hh],     // cantos (largura+altura)
             ['n',0,-hh],['s',0,hh],['e',hw,0],['w',-hw,0]];              // lados (só largura OU altura)
  for(const [name,x,y] of pts) if(Math.hypot(l.x-x,l.y-y)<=HANDLE_R) return name;
  if(Math.abs(l.x)<=hw+HANDLE_R && Math.abs(l.y)<=hh+HANDLE_R) return 'move';
  return null; }
// moldura tracejada + alças (canto/lado=tamanho, verde=girar, ✕ vermelho=apagar) de uma caixa qualquer
function drawShapeChrome(cx,cy,w,h,rot,g){ g=g||ctx; const hw=w/2, hh=h/2;
  g.save(); g.translate(cx,cy); g.rotate(rot);
  g.setLineDash([7,5]); g.strokeStyle='#7a7f87'; g.lineWidth=1;   // moldura tracejada
  g.strokeRect(-hw,-hh,w,h); g.setLineDash([]);
  g.beginPath(); g.moveTo(0,-hh); g.lineTo(0,-hh-ROT_OFF); g.stroke();   // haste do giro
  g.beginPath(); g.arc(0,-hh-ROT_OFF,8,0,Math.PI*2); g.fillStyle='#22c55e'; g.fill();
  g.lineWidth=2; g.strokeStyle='#fff'; g.stroke();                          // alça verde = girar
  g.fillStyle='#fff'; g.strokeStyle='#7a7f87'; g.lineWidth=1.5;            // alças de canto + lado = tamanho
  [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh],[0,-hh],[0,hh],[hw,0],[-hw,0]].forEach(([x,y])=>{
    g.beginPath(); g.rect(x-7,y-7,14,14); g.fill(); g.stroke(); });
  const dlx=hw+24, dly=-hh-24;                                                   // botão ✕ vermelho GIGANTE = apagar a forma
  g.beginPath(); g.arc(dlx,dly,26,0,Math.PI*2); g.fillStyle='#ef4444'; g.fill();
  g.lineWidth=3; g.strokeStyle='#fff'; g.stroke();
  g.lineCap='round'; g.lineWidth=5;
  g.beginPath(); g.moveTo(dlx-10,dly-10); g.lineTo(dlx+10,dly+10);
  g.moveTo(dlx+10,dly-10); g.lineTo(dlx-10,dly+10); g.stroke();
  g.restore(); }
// redesenha a camada de texto: todos os textos fixados + (se houver) o texto flutuante/em edição com as alças.
function renderTextLayer(){ tctx.clearRect(0,0,tcv.width,tcv.height);
  for(const s of texts) drawText(s, tctx);
  if(txtEdit){                                               // digitando: caixa-aid (fundo/borda) + alças; o texto vem do textarea por cima
    const ed=txtEdit, h=ed.curH(), r=txtRadius||0;
    tctx.save(); tctx.translate(ed.cx,ed.cy); tctx.rotate(ed.rot);
    tctx.fillStyle=bgCss(txtBg) || 'rgba(255,255,255,0.5)'; boxPath(tctx,-ed.w/2,-h/2,ed.w,h,r); tctx.fill();
    if(txtBorder && txtBorder.width>0){ const bw=txtBorder.width; tctx.lineWidth=bw; tctx.strokeStyle=bgCss(txtBorder);
      boxPath(tctx,-ed.w/2+bw/2,-h/2+bw/2, ed.w-bw, h-bw, Math.max(0,r-bw/2)); tctx.stroke(); }
    tctx.restore();
    drawShapeChrome(ed.cx,ed.cy,ed.w,h,ed.rot, tctx);
  } else if(pendingShape && pendingShape.type==='text'){     // texto flutuante (selecionado, não editando): texto + alças
    drawText(pendingShape, tctx);
    drawShapeChrome(pendingShape.cx,pendingShape.cy,pendingShape.w,pendingShape.h,pendingShape.rot, tctx);
  }
}
// alça laranja (losango) de AJUSTE — formas que dá pra remodelar (seta, balão de fala, quadrado)
const ADJUSTABLE={ arrow:1, speech:1, rectspeech:1, oval:1, funbubble:1, cloudspeech:1, burst:1, thought:1, rect:1 };
const TAILED={ speech:1, rectspeech:1, oval:1, funbubble:1, cloudspeech:1, burst:1, thought:1 };   // balões com ponta de rabicho/bolhas livre
function adjustPos(s){ const hw=s.w/2, hh=s.h/2;                         // posição local da alça por tipo
  if(s.type==='arrow')  return { x:hw*(s.aNeck??0.1),    y:-hh*(s.aBody??0.38) };   // pescoço da seta
  if(TAILED[s.type])    return { x:hw*(s.aTailX??-0.4), y:hh*(s.aTailY??1.35) };    // PONTA do rabicho/bolhas (livre, até fora da caixa)
  if(s.type==='rect')   return { x:-hw+Math.max(Math.min(hw,hh)*(s.aRad??0),18), y:-hh };   // sobre a borda de cima
  return null; }
function applyAdjust(s,l){ const hw=s.w/2, hh=s.h/2, cl=(v,a,b)=>Math.max(a,Math.min(b,v));
  if(s.type==='arrow'){  s.aNeck=cl(l.x/hw,-0.85,0.92); s.aBody=cl(-l.y/hh,0.12,0.96); }   // x=cabeça, y=espessura
  else if(TAILED[s.type]){ s.aTailX=cl(l.x/hw,-2.2,2.2); s.aTailY=cl(l.y/hh,-2.2,2.2); }  // ponta: livre em volta (aponta pra qualquer lado)

  g.save(); g.translate(s.cx,s.cy); g.rotate(s.rot); g.translate(ap.x,ap.y); g.rotate(Math.PI/4);   // quadrado girado 45° = losango

function renderPending(){ if(pendingShape && pendingShape.type==='text'){ renderTextLayer(); updateTextToolsPos(); return; }   // texto: só a camada de texto

  drawShapeChrome(pendingShape.cx,pendingShape.cy,pendingShape.w,pendingShape.h,pendingShape.rot);

function commitPending(){ if(!pendingShape) return;        // fixa: redesenha SEM as alças e grava no undo

    renderTextLayer(); pushUndo(); cv.style.cursor=toolCursor(); updateTextToolsPos(); return; }
  ctx.putImageData(pendingSnapshot,0,0); drawShapeT(pendingShape);   // formas/predef: queimam no fundo (dá pra pintar por cima/dentro)

function cancelPending(){ if(!pendingShape) return;        // descarta a forma flutuante

  else { ctx.putImageData(pendingSnapshot,0,0); pendingShape=null; pendingSnapshot=null; }   // forma: volta ao snapshot do fundo

// ---- seleção de texto já fixado (na camada): clicar com a ferramenta Texto "levanta" o texto pra editar/mover ----
function pointInText(s,p){ const l=toLocal(s,p); return Math.abs(l.x)<=s.w/2 && Math.abs(l.y)<=s.h/2; }

function liftText(i){ const s=texts.splice(i,1)[0];        // tira da camada e vira forma flutuante (com alças)
  pendingShape=s; pendingShape._fromLayer=true; pendingSnapshot=null;   // marca: veio da camada (desfazer devolve, não apaga)
  txtFont=s.font||txtFont; txtSize=s.fontSize; txtBold=s.bold; txtItalic=s.italic; txtUnder=s.underline;

// ---- curva estilo Paint: arrasta a base, depois arrasta 2x pra moldar; ao terminar

let curvePhase=0, curveDrag=false, cP0,cP3,cC1,cC2, curveSnap=null;
function drawCurvePreview(){
  ctx.putImageData(curveSnap,0,0);
  ctx.strokeStyle=`rgb(${color[0]},${color[1]},${color[2]})`;
  ctx.lineWidth=brushSize; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(cP0.x,cP0.y);
  if(curvePhase===0) ctx.lineTo(cP3.x,cP3.y);                    // ainda é a linha base
  else ctx.bezierCurveTo(cC1.x,cC1.y,cC2.x,cC2.y,cP3.x,cP3.y);   // cúbica (2 controles)

function endCurve(commit){                        // interrompe curva em andamento (trocar ferramenta/Esc/limpar)
  if(commit) pushUndo();                          // a curva já está no canvas

  curvePhase=0; curveDrag=false; curveSnap=null;

function curveToShape(){                           // os 4 pontos da bézier viram forma normalizada na caixa
  const xs=[cP0.x,cC1.x,cC2.x,cP3.x], ys=[cP0.y,cC1.y,cC2.y,cP3.y];
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const cx=(minX+maxX)/2, cy=(minY+maxY)/2, w=Math.max(1,maxX-minX), h=Math.max(1,maxY-minY);
  const hw=w/2, hh=h/2, n=P=>({x:(P.x-cx)/hw, y:(P.y-cy)/hh});
  return { type:'curve', cx, cy, w, h, rot:0, pts:[n(cP0),n(cC1),n(cC2),n(cP3)] };
}

cv.addEventListener('pointerdown',e=>{ if(tool==='hand'||e.button===1){ panning=true; panLast={x:e.clientX,y:e.clientY}; cv.setPointerCapture(e.pointerId); cv.style.cursor='grabbing'; e.preventDefault(); return; }

    if(hit==='rotate' || hit==='move' || HVEC[hit]){ e.preventDefault(); editDrag={mode:hit,last:p}; cv.setPointerCapture(e.pointerId); applyCursor(hit); return; }   // pega alça/move sem perder o foco

    if(hit){ dragMode=hit; dragLast=p; dragMoved=false; applyCursor(hit); cv.setPointerCapture(e.pointerId); return; }
    commitPending();                         // clicou fora: fixa a forma e segue pro comportamento da ferramenta

  if(tool==='text'){                         // texto: clicar num existente seleciona; senão arrasta pra criar (estilo Paint)
    const ti=textAt(p); if(ti>=0){ liftText(ti); return; }   // clicou num texto já fixado → vira forma flutuante (mover/editar)
    textDragging=true; textStart=p; textSnap=ctx.getImageData(0,0,cv.width,cv.height);
    cv.setPointerCapture(e.pointerId); return;
  }
  if(tool==='curve'){ cv.setPointerCapture(e.pointerId);   // arrasta a base, depois molda 2x
    if(curvePhase===0){ cP0={x:p.x,y:p.y}; cP3={x:p.x,y:p.y}; curveSnap=ctx.getImageData(0,0,cv.width,cv.height); }

cv.addEventListener('pointermove',e=>{ if(panning){ panX+=e.clientX-panLast.x; panY+=e.clientY-panLast.y; panLast={x:e.clientX,y:e.clientY}; applyView(); return; }

    if(m==='move'){ ed.cx+=pp.x-editDrag.last.x; ed.cy+=pp.y-editDrag.last.y; editDrag.last=pp; }
    else if(m==='rotate'){ ed.rot=Math.atan2(pp.y-ed.cy,pp.x-ed.cx)+Math.PI/2; }
    else { const eb={cx:ed.cx,cy:ed.cy,w:ed.w,h:ed.curH(),rot:ed.rot}, l=toLocal(eb,pp), hv=HVEC[m], hx=hv[0], hy=hv[1], c=Math.cos(ed.rot), sn=Math.sin(ed.rot);
      if(hx){ const hw=ed.w/2, nhw=Math.max(20,Math.abs(l.x+hx*hw)/2), dx=hx*(nhw-hw); ed.cx+=dx*c; ed.cy+=dx*sn; ed.w=nhw*2; }          // largura: reflowa o texto

cv.addEventListener('pointerup',e=>{ if(panning){ panning=false; cv.style.cursor=toolCursor(); return; }
  if(editDrag){ editDrag=null; if(txtEdit) setTimeout(()=>txtEdit&&txtEdit.ta.focus(),0); return; }   // soltou a alça: volta a digitar
  if(textDragging){ textDragging=false; const b=pos(e);
    ctx.putImageData(textSnap,0,0); textSnap=null;            // limpa o preview; a caixa de digitação entra por cima
    const w=Math.abs(b.x-textStart.x), h=Math.abs(b.y-textStart.y);
    openTextEditor({ cx:(textStart.x+b.x)/2, cy:(textStart.y+b.y)/2,
      w: w<20 ? DEFAULT_TEXT_W : w, h: h<20 ? 0 : h });       // arraste curto = caixa padrão / altura livre
    return; }
  if(tool==='curve' && curveDrag){ const p=pos(e); curveDrag=false;
    if(curvePhase===0){ cP3={x:p.x,y:p.y};
      cC1={x:cP0.x+(cP3.x-cP0.x)/3, y:cP0.y+(cP3.y-cP0.y)/3};      // controles na linha base
      cC2={x:cP0.x+2*(cP3.x-cP0.x)/3, y:cP0.y+2*(cP3.y-cP0.y)/3};
      curvePhase=1; drawCurvePreview(); }
    else if(curvePhase===1){ cC1={x:p.x,y:p.y}; curvePhase=2; drawCurvePreview(); }
    else if(curvePhase===2){ cC2={x:p.x,y:p.y};                    // curva pronta: vira forma flutuante
      ctx.putImageData(curveSnap,0,0);                             // limpa o preview (as alças entram no renderPending)

// dropdown próprio (estilizável + não rouba o foco da digitação): trigger + lista de opções.
function makeDropdown(items, value, width, onPick){
  const wrap=document.createElement('div'); wrap.className='tt-dd';
  const cur=document.createElement('button'); cur.type='button'; cur.className='tt-dd-cur';
  const list=document.createElement('div'); list.className='tt-dd-list'; list.hidden=true;
  if(width){ cur.style.minWidth=width+'px'; list.style.minWidth=width+'px'; }
  const itemOf=v=>items.find(i=>String(i.value)===String(v));
  function renderCur(){ const it=itemOf(value); cur.textContent=it?it.label:value; cur.style.fontFamily=it&&it.font?it.font+',sans-serif':''; }
  function markSel(){ [...list.children].forEach(o=>o.classList.toggle('sel', String(o.dataset.value)===String(value))); }
  function close(){ list.hidden=true; wrap.classList.remove('open'); }
  function open(){ const r=cur.getBoundingClientRect();
    list.hidden=false; wrap.classList.add('open'); markSel();                 // mostra primeiro pra medir a altura real
    list.style.left=r.left+'px';
    const h=list.offsetHeight, vh=window.innerHeight;
    if(r.bottom+6+h > vh && r.top-6-h > 0) list.style.top=(r.top-6-h)+'px';   // não cabe embaixo (e cabe em cima) → abre pra cima
    else list.style.top=(r.bottom+6)+'px';                                    // padrão: sob o gatilho
  }
  items.forEach(it=>{ const o=document.createElement('button'); o.type='button'; o.className='tt-dd-opt'; o.dataset.value=it.value;
    o.textContent=it.label; if(it.font) o.style.fontFamily=it.font+',sans-serif';
    o.addEventListener('click',()=>{ value=it.value; renderCur(); close(); onPick(it.value); });
    list.appendChild(o); });
  cur.addEventListener('click',()=>{ list.hidden?open():close(); });
  wrap.addEventListener('mousedown',e=>e.preventDefault());                  // gatilho não tira o foco da digitação
  list.addEventListener('mousedown',e=>e.preventDefault());                  // lista (no body) também não tira o foco
  document.addEventListener('pointerdown',e=>{ if(!wrap.contains(e.target) && !list.contains(e.target)) close(); });   // fecha ao clicar fora
  wrap.appendChild(cur); document.body.appendChild(list); renderCur();       // lista no <body> p/ ficar acima do textarea (z-index 3000)
  wrap.set=v=>{ value=v; renderCur(); };
  return wrap;
}

// controle de fundo: swatches (paleta) + "sem fundo" + opacidade; aplica ao vivo sem fechar a digitação

  function renderCur(){ cur.style.background = txtBg ? bgCss(txtBg) : ''; cur.classList.toggle('is-none', !txtBg);
    if(txtBg) op.value=Math.round(txtBg.a*100); opVal.textContent=op.value+'%';
    [...grid.children].forEach(b=>b.classList.toggle('sel', !!txtBg && b.dataset.hex===txtBg.hex)); }

    b.addEventListener('click',()=>{ const [r,g,bl]=hexToRgba(hex); txtBg={r,g,b:bl,a:opacity(),hex}; renderCur(); applyBg(); });
    grid.appendChild(b); });
  none.addEventListener('click',()=>{ txtBg=null; renderCur(); applyBg(); });

  pop.append(none, grid, opRow);
  function close(){ pop.hidden=true; wrap.classList.remove('open'); }
  function open(){ const r=cur.getBoundingClientRect(); pop.style.left=Math.max(8,r.right-208)+'px'; pop.style.top=(r.bottom+6)+'px'; pop.hidden=false; wrap.classList.add('open'); renderCur(); }
  cur.addEventListener('click',()=>{ pop.hidden?open():close(); });
  wrap.addEventListener('mousedown',e=>e.preventDefault());
  pop.addEventListener('mousedown',e=>{ if(e.target!==op) e.preventDefault(); });   // slider precisa do arraste
  document.addEventListener('pointerdown',e=>{ if(!wrap.contains(e.target) && !pop.contains(e.target)) close(); });
  wrap.appendChild(cur); document.body.appendChild(pop); renderCur();
  wrap.set=()=>renderCur();

// controle de borda: mesma cor/opacidade do fundo + espessura do contorno
function makeBorderControl(){
