<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Quebra-cabeça — Kaco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; }
        body { background: #eaf4fb; font-family: 'Baloo 2', system-ui, sans-serif; }

        #puzzleCanvas { display: block; touch-action: none; }

        /* Barra de controles — fica logo ABAIXO do menu principal (kids-menu).
           --menu-h é a altura real do menu, medida em JS (varia no mobile).
           Grid 1fr|auto|1fr: os níveis ficam SEMPRE centrados (em fluxo, então a
           barra tem altura real) e o título encosta à esquerda. */
        .pz-bar {
            position: fixed; top: var(--menu-h, 52px); left: 0; right: 0; z-index: 20;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px;
            padding: 14px 28px;
            background: rgba(255, 255, 255, .82); backdrop-filter: blur(6px);
            box-shadow: 0 4px 14px rgba(15, 39, 64, .10);
        }
        .pz-title {
            font-weight: 800; font-size: 24px; color: #0f2740;
            min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        /* Níveis + formas juntos, centralizados no meio da barra, com uma linha
           divisória entre os dois grupos e bastante espaço em volta dela. */
        .pz-center { grid-column: 2; display: flex; align-items: center; gap: 32px; }
        .pz-sep { align-self: stretch; width: 2px; background: rgba(15, 39, 64, .14); border-radius: 2px; }
        .pz-niveis { display: flex; gap: 10px; }
        .pz-nivel {
            text-decoration: none; font-weight: 700; font-size: 16px; color: #fff;
            min-width: 56px; text-align: center;
            border-radius: 14px; padding: 11px 30px; box-shadow: 0 4px 10px rgba(15, 39, 64, .12);
            transition: transform .12s ease, filter .12s ease; opacity: .55;
        }
        .pz-nivel:hover { transform: translateY(-2px); }
        .pz-nivel.is-active { opacity: 1; transform: translateY(-1px); }

        /* Seletor de forma do corte (Reto / Geométrico), à direita da barra. */
        .pz-formas { display: flex; gap: 8px; }
        .pz-forma {
            text-decoration: none; font-weight: 700; font-size: 14px; color: #0f2740;
            background: #fff; border: 2px solid #e2e8f0; border-radius: 12px;
            padding: 8px 14px; box-shadow: 0 4px 10px rgba(15, 39, 64, .10);
            transition: transform .12s ease, border-color .12s ease, color .12s ease;
        }
        .pz-forma:hover { transform: translateY(-2px); }
        .pz-forma.is-active { border-color: #2aa9e0; color: #2aa9e0; }

        /* Telas estreitas: empilha (título, níveis e formas em linhas centradas). */
        @media (max-width: 820px) {
            .pz-bar { grid-template-columns: 1fr; justify-items: center; gap: 8px; padding: 12px 16px; }
            .pz-center { grid-column: auto; flex-direction: column; gap: 14px; }
            .pz-sep { align-self: stretch; width: auto; height: 2px; }
            .pz-niveis { flex-wrap: wrap; justify-content: center; }
            .pz-nivel { padding: 10px 22px; }
            .pz-formas { flex-wrap: wrap; justify-content: center; }
        }

        .pz-hint {
            position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
            z-index: 15; font-weight: 600; font-size: 13px; color: #355;
            background: rgba(255, 255, 255, .8); border-radius: 999px; padding: 6px 14px;
        }

        /* Tela de "Parabéns" */
        .pz-win {
            position: fixed; inset: 0; z-index: 50; display: none;
            align-items: center; justify-content: center;
            background: rgba(15, 39, 64, .55); backdrop-filter: blur(4px);
        }
        .pz-win.show { display: flex; }
        /* Modal de vitória: a IMAGEM montada é a estrela (grande e em destaque);
           título compacto em cima e ações embaixo. A caixa se ajusta à imagem. */
        .pz-win-box {
            background: #fff; border-radius: 26px; padding: 16px 16px 18px; text-align: center;
            max-width: min(97vw, 1180px); box-shadow: 0 24px 60px rgba(15, 39, 64, .35);
            animation: pzpop .7s cubic-bezier(.2, 1.2, .4, 1);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        @keyframes pzpop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .pz-win-title { margin: 0; color: #0f2740; font-size: 28px; }
        .pz-win-img {
            display: block; width: auto; height: auto;
            max-width: min(95vw, 1120px); max-height: 80vh;
            object-fit: contain; border-radius: 16px;
            box-shadow: 0 14px 40px rgba(15, 39, 64, .30);
        }
        .pz-win-acoes { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .pz-win-acoes a {
            text-decoration: none; font-weight: 800; font-size: 15px; color: #fff;
            border-radius: 14px; padding: 12px 18px; cursor: pointer;
        }
        .pz-de-novo { background: var(--c-green, #22b07d); }
        .pz-voltar  { background: #2aa9e0; }
    </style>
</head>
<body>

<div class="pz-bar">
    <span class="pz-title" id="pzTitle">Quebra-cabeça</span>
    <div class="pz-center">
        <div class="pz-niveis" id="pzNiveis"></div>
        <div class="pz-sep" aria-hidden="true"></div>
        <div class="pz-formas" id="pzFormas"></div>
    </div>
</div>

<div id="game-container" data-img="img/kaco.png">
    <canvas id="puzzleCanvas"></canvas>
</div>

<div class="pz-hint">Arraste as peças pra montar a figura 🧩</div>

<div class="pz-win" id="puzzle-win">
    <div class="pz-win-box">
        <h2 class="pz-win-title">🎉 Parabéns!</h2>
        <img class="pz-win-img" id="pzWinImg" src="" alt="figura montada">
        <div class="pz-win-acoes">
            <a class="pz-de-novo" id="pzDeNovo" href="#">Jogar de novo</a>
            <a class="pz-voltar" href="quebra-cabeca.html">Outros</a>
        </div>
    </div>
</div>

<script src="components/kids-menu.js"></script>
<script src="components/kids-nav.js"></script>
<script src="components/kids-stories.js"></script>
<script>
    // Resolve a história pela URL (?h=<id>&n=<N>) e monta os botões de nível.
    (function () {
        // Layout do topo medido em runtime: a barra encosta abaixo do menu
        // (--menu-h) e os botões Voltar/Avançar (kids-nav) ficam abaixo da barra.
        function syncLayout() {
            var menu = document.querySelector('.menu');
            var bar  = document.querySelector('.pz-bar');
            var nav  = document.querySelector('.kids-nav');
            if (menu) document.documentElement.style.setProperty('--menu-h', menu.offsetHeight + 'px');
            if (bar && nav) nav.style.top = Math.round(bar.getBoundingClientRect().bottom + 12) + 'px';
        }
        window.addEventListener('resize', syncLayout);

        var params = new URLSearchParams(location.search);
        var id = params.get('h');
        var nivel = parseInt(params.get('n'), 10) || 3;
        // Forma do corte: URL (?f=) tem prioridade; senão a última escolhida
        // (lembrada no navegador); senão o padrão "encaixe". A escolha é memorizada
        // e exposta em window.PZ_FORMA pro motor (kids-puzzle.js) usar a mesma.
        var FORMA_KEY = 'kids-puzzle-forma';
        var FORMAS_OK = ['encaixe', 'geo', 'reto'];
        var urlF = params.get('f');
        var savedF = null;
        try { savedF = localStorage.getItem(FORMA_KEY); } catch (e) {}
        var forma = FORMAS_OK.indexOf(urlF) >= 0 ? urlF
                  : (FORMAS_OK.indexOf(savedF) >= 0 ? savedF : 'encaixe');
        try { localStorage.setItem(FORMA_KEY, forma); } catch (e) {}
        window.PZ_FORMA = forma;

        // Casa o id com a fonte única (kids-stories.js); fallback: img/título legados na URL.
        var story = (window.KIDS_STORIES || []).filter(function (s) { return s.id === id; })[0];
        var img = story ? story.img : params.get('img');
        var titulo = story ? story.t : params.get('titulo');

        if (img) document.getElementById('game-container').setAttribute('data-img', img);
        if (titulo) {
            document.getElementById('pzTitle').textContent = titulo;
            document.title = titulo + ' — Quebra-cabeça';
        }

        // Níveis fixos: grade quadrada NxN, do 2×2 ao 6×6 (verde → vermelho).
        var niveis = [
            { n: 1, cor: '#38bdf8' },
            { n: 2, cor: '#22b07d' },
            { n: 3, cor: '#84cc16' },
            { n: 4, cor: '#f59e0b' },
            { n: 5, cor: '#f97316' },
            { n: 6, cor: '#ec5a5a' }
        ];
        // Monta a URL preservando história/imagem; n = nível, f = forma do corte.
        function urlJogo(n, f) {
            var u = new URLSearchParams();
            if (id) u.set('h', id);                       // URL limpa: só o id da história
            else { if (img) u.set('img', img); if (titulo) u.set('titulo', titulo); }
            u.set('n', n);
            if (f) u.set('f', f);                          // sempre explícito (a forma é lembrada)
            return 'quebra-cabeca-jogo.html?' + u.toString();
        }
        document.getElementById('pzNiveis').innerHTML = niveis.map(function (nv) {
            var active = nv.n === nivel ? ' is-active' : '';
            return '<a class="pz-nivel' + active + '" style="background:' + nv.cor + '" href="'
                + urlJogo(nv.n, forma) + '">' + nv.n + '×' + nv.n + '</a>';
        }).join('');

        // Seletor de forma do corte: troca reto ↔ geométrico mantendo o nível atual.
        var formas = [ { f: 'encaixe', label: 'Encaixe' }, { f: 'geo', label: 'Geométrico' }, { f: 'reto', label: 'Reto' } ];
        document.getElementById('pzFormas').innerHTML = formas.map(function (fo) {
            var active = fo.f === forma ? ' is-active' : '';
            return '<a class="pz-forma' + active + '" href="' + urlJogo(nivel, fo.f) + '">' + fo.label + '</a>';
        }).join('');

        // "Jogar de novo" recarrega o mesmo nível.
        document.getElementById('pzDeNovo').addEventListener('click', function (e) {
            e.preventDefault(); location.reload();
        });

        // O menu e o kids-nav só se injetam no DOMContentLoaded; só DEPOIS disso dá
        // pra medir a barra e encaixar o Voltar/Avançar abaixo dela. O resize forçado
        // faz o quebra-cabeça recomputar a área de trabalho já com o topo posicionado.
        function initLayout() {
            syncLayout();
            window.dispatchEvent(new Event('resize'));
        }
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', initLayout);
        } else {
            initLayout();
        }
    })();
</script>
<script src="components/kids-puzzle.js"></script>
</body>
</html>
